<!DOCTYPE html>
<html lang="it" data-t="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Simulatore Decisionale</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

:root{
  --bg:#f5f4f0;--bg1:#fff;--bg2:#eceae3;--bg3:#e0ddd5;
  --b1:rgba(0,0,0,.07);--b2:rgba(0,0,0,.13);
  --t1:#1c1a14;--t2:#6b6860;--t3:#a8a59d;
  --acc:#c0420a;--abg:rgba(192,66,10,.09);
  --grn:#1a7a3a;--gbg:rgba(26,122,58,.09);
  --red:#b91c1c;--rbg:rgba(185,28,28,.08);
  --amb:#92400e;--mbg:rgba(146,64,14,.09);
  --pur:#534AB7;--pgbg:rgba(83,74,183,.09);
  --sh:0 1px 4px rgba(0,0,0,.09);
  --pill:#fff8f5;
}
[data-t=dark]{
  --bg:#0a0a0a;--bg1:#0f0f0f;--bg2:#161616;--bg3:#1d1d1d;
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);
  --t1:#f5f0eb;--t2:#8a8680;--t3:#45433e;
  --acc:#e05a1a;--abg:rgba(224,90,26,.11);
  --grn:#22c55e;--gbg:rgba(34,197,94,.09);
  --red:#f87171;--rbg:rgba(248,113,113,.09);
  --amb:#fbbf24;--mbg:rgba(251,191,36,.09);
  --pur:#7c74e0;--pgbg:rgba(124,116,224,.09);
  --sh:0 1px 6px rgba(0,0,0,.5);
  --pill:#140f0a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.65;min-height:100vh}

/* TOPBAR */
.topbar{background:var(--bg1);border-bottom:1px solid var(--b1);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.brand{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;white-space:nowrap;flex-shrink:0}
.brand em{font-style:italic;color:var(--acc)}
.ch-nav{display:flex;gap:3px;overflow-x:auto;flex:1;justify-content:center}
.ch-nav::-webkit-scrollbar{display:none}
.cpill{padding:4px 12px;border-radius:20px;border:1px solid var(--b1);background:transparent;color:var(--t2);cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .15s}
.cpill:hover{background:var(--bg2);color:var(--t1)}
.cpill.on{background:var(--acc);color:#fff;border-color:var(--acc);font-weight:500}
.tog{display:flex;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;user-select:none}
.tog-track{width:38px;height:21px;border-radius:11px;border:1px solid var(--b2);background:var(--bg3);position:relative;flex-shrink:0}
.tog-thumb{width:15px;height:15px;border-radius:50%;background:var(--t1);position:absolute;top:2px;left:2px;transition:transform .22s}
[data-t=dark] .tog-thumb{transform:translateX(17px)}
.tog-lbl{font-size:11px;color:var(--t3)}

/* LAYOUT */
.wrap{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 52px)}
.sidebar{background:var(--bg1);border-right:1px solid var(--b1);padding:20px 0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--bg3)}
.sb-lbl{font-size:9px;font-weight:500;letter-spacing:.12em;color:var(--t3);text-transform:uppercase;margin:14px 14px 8px}
.sbi{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;transition:all .13s;font-size:11px;color:var(--t2);border:none;background:transparent;font-family:'DM Sans',sans-serif;width:100%;text-align:left}
.sbi:hover{background:var(--bg2);color:var(--t1)}
.sbi.on{background:var(--abg);color:var(--acc);font-weight:500}
.sbn{font-family:'JetBrains Mono',monospace;font-size:9px;width:16px;height:16px;border-radius:4px;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--t3)}
.sbi.on .sbn{background:var(--acc);color:#fff}

/* CAPITAL WIDGET */
.sb-capital{margin:14px;background:var(--bg2);border-radius:12px;padding:13px 14px;border:1px solid var(--b1)}
.cap-label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.cap-val{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:500;line-height:1}
.cap-delta{font-size:11px;margin-top:4px;font-family:'JetBrains Mono',monospace}
.cap-bar{height:4px;background:var(--bg3);border-radius:2px;margin-top:8px;overflow:hidden}
.cap-fill{height:100%;border-radius:2px;transition:width .4s ease,background .3s}

/* CONTENT */
.content{overflow-y:auto;padding:32px 44px 80px}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--bg3)}
.ch{display:none}
.ch.on{display:block;animation:rise .2s ease}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* HERO */
.hero{margin-bottom:32px}
.hero-lbl{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--acc);letter-spacing:.08em;font-weight:500;text-transform:uppercase;margin-bottom:10px}
.hero-dot{width:5px;height:5px;border-radius:50%;background:var(--acc)}
.hero-title{font-family:'Playfair Display',serif;font-size:34px;line-height:1.15;color:var(--t1);margin-bottom:10px}
.hero-title em{font-style:italic;color:var(--acc)}
.hero-lead{font-size:15px;color:var(--t2);line-height:1.78;max-width:540px}
.hero-rule{height:1px;background:var(--b1);margin-top:24px}
.slbl{font-size:9px;font-weight:500;letter-spacing:.13em;color:var(--t3);text-transform:uppercase;margin:24px 0 10px}
.hr{height:1px;background:var(--b1);margin:22px 0}

/* GRID CARDS */
.mg{display:grid;gap:10px;margin-bottom:16px}
.mg2{grid-template-columns:1fr 1fr}
.mg3{grid-template-columns:1fr 1fr 1fr}
.mg4{grid-template-columns:repeat(4,1fr)}
.mc{background:var(--bg2);border-radius:12px;padding:12px 14px;border:1px solid var(--b1)}
.mc-l{font-size:9px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.mc-v{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500;line-height:1}
.mc-s{font-size:11px;color:var(--t2);margin-top:4px;line-height:1.55}
.callout{border-left:3px solid var(--acc);background:var(--abg);border-radius:0 10px 10px 0;padding:12px 16px;margin:14px 0;font-size:13px;color:var(--t2);line-height:1.75}
.callout strong{color:var(--t1);font-weight:500}
.c-ok{border-color:var(--grn);background:var(--gbg)}
.c-warn{border-color:var(--red);background:var(--rbg)}
.c-pur{border-color:var(--pur);background:var(--pgbg)}
.btn-row{display:flex;gap:9px;flex-wrap:wrap;margin-top:24px;padding-top:18px;border-top:1px solid var(--b1)}
.btn-p{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;background:var(--acc);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .15s}
.btn-p:hover{opacity:.85}
.btn-g{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;background:transparent;color:var(--t2);border:1px solid var(--b2);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s}
.btn-g:hover{background:var(--bg2);color:var(--t1)}
.badge{display:inline-block;font-size:9px;font-weight:500;padding:2px 7px;border-radius:12px;font-family:'JetBrains Mono',monospace}
.ba{background:var(--abg);color:var(--acc)}
.bg{background:var(--gbg);color:var(--grn)}
.br{background:var(--rbg);color:var(--red)}
.bm{background:var(--mbg);color:var(--amb)}
.bp{background:var(--pgbg);color:var(--pur)}

/* ═══ SIMULATORE UI ═══ */

/* SCENARIO SELECTOR */
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.sc-card{background:var(--pill);border:1px solid var(--b1);border-radius:14px;padding:16px 18px;cursor:pointer;transition:all .18s;box-shadow:var(--sh)}
.sc-card:hover{border-color:var(--acc);box-shadow:0 2px 12px rgba(192,66,10,.12)}
.sc-card.locked{opacity:.45;cursor:default}
.sc-card-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--acc);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.sc-card-title{font-family:'Playfair Display',serif;font-size:16px;line-height:1.3;color:var(--t1);margin-bottom:6px}
.sc-card-meta{font-size:11px;color:var(--t2);line-height:1.6}
.sc-card-diff{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;font-family:'JetBrains Mono',monospace}
.diff-base{background:var(--gbg);color:var(--grn)}
.diff-med{background:var(--mbg);color:var(--amb)}
.diff-adv{background:var(--rbg);color:var(--red)}

/* SIMULATOR MAIN */
.sim-wrap{display:none}
.sim-wrap.on{display:block}

/* TIMELINE */
.timeline{background:var(--bg1);border:1px solid var(--b1);border-radius:12px;padding:14px 16px;margin-bottom:16px;overflow-x:auto}
.tl-label{font-size:10px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.tl-track{display:flex;align-items:center;gap:0;min-width:max-content}
.tl-node{display:flex;flex-direction:column;align-items:center;cursor:pointer}
.tl-circle{width:28px;height:28px;border-radius:50%;border:2px solid var(--b2);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;color:var(--t3);transition:all .2s;flex-shrink:0}
.tl-node.done .tl-circle{background:var(--gbg);border-color:var(--grn);color:var(--grn)}
.tl-node.done.loss .tl-circle{background:var(--rbg);border-color:var(--red);color:var(--red)}
.tl-node.active .tl-circle{background:var(--acc);border-color:var(--acc);color:#fff;box-shadow:0 0 0 4px var(--abg)}
.tl-node.event .tl-circle{border-color:var(--amb)}
.tl-meta{font-size:8px;color:var(--t3);margin-top:4px;text-align:center;max-width:40px;line-height:1.3}
.tl-node.active .tl-meta{color:var(--acc)}
.tl-line{width:24px;height:2px;background:var(--b2);flex-shrink:0;margin-bottom:14px}
.tl-line.done{background:var(--grn)}

/* MARKET PANEL */
.mkt-panel{display:grid;grid-template-columns:1fr 220px;gap:12px;margin-bottom:14px}
.mkt-data{background:var(--pill);border:1px solid var(--b1);border-radius:12px;padding:14px 16px}
.mkt-data-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.mkt-cell{background:var(--bg1);border-radius:8px;padding:9px 11px;border:1px solid var(--b1)}
.mkt-cell-l{font-size:9px;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px}
.mkt-cell-v{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:500;line-height:1}
.mkt-event{background:var(--mbg);border:1px solid var(--amb);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--t2);display:none}
.mkt-event.on{display:block}
.mkt-event strong{color:var(--amb);font-weight:500}
.chart-box{background:var(--pill);border:1px solid var(--b1);border-radius:12px;padding:12px 14px}
.chart-box canvas{width:100%!important;height:130px!important}

/* POSITIONS */
.pos-panel{background:var(--pill);border:1px solid var(--b1);border-radius:12px;padding:14px 16px;margin-bottom:14px}
.pos-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pos-title{font-size:12px;font-weight:500;color:var(--t1)}
.pos-pandl{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:500}
.pos-table{width:100%;border-collapse:collapse;font-size:11px}
.pos-table th{color:var(--t3);font-weight:400;letter-spacing:.06em;font-size:9px;text-transform:uppercase;padding:4px 6px;text-align:left;border-bottom:1px solid var(--b1)}
.pos-table td{padding:7px 6px;border-bottom:1px solid var(--b1);color:var(--t2);font-family:'JetBrains Mono',monospace;font-size:11px}
.pos-table tr:last-child td{border-bottom:none}
.pos-table .pos-act{cursor:pointer;color:var(--red);font-size:10px;text-decoration:underline}
.no-pos{font-size:12px;color:var(--t3);text-align:center;padding:16px}

/* DECISION PANEL */
.dec-panel{background:var(--pill);border:1px solid var(--b1);border-radius:14px;padding:18px 20px;margin-bottom:14px}
.dec-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--t1);margin-bottom:4px}
.dec-sub{font-size:12px;color:var(--t2);margin-bottom:16px;line-height:1.6}
.dec-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.dec-btn{background:var(--bg1);border:1px solid var(--b1);border-radius:10px;padding:13px 14px;cursor:pointer;text-align:left;transition:all .15s;font-family:'DM Sans',sans-serif}
.dec-btn:hover{border-color:var(--acc);background:var(--abg)}
.dec-btn-icon{font-size:18px;margin-bottom:6px}
.dec-btn-label{font-size:13px;font-weight:500;color:var(--t1);display:block;margin-bottom:3px}
.dec-btn-sub{font-size:11px;color:var(--t2);line-height:1.5}

/* OPTION BUILDER */
.opt-builder{background:var(--bg2);border-radius:12px;padding:16px;margin-bottom:14px;display:none}
.opt-builder.on{display:block;animation:rise .18s ease}
.ob-title{font-size:12px;font-weight:500;color:var(--t1);margin-bottom:12px}
.ob-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.ob-label{font-size:11px;color:var(--t2);min-width:70px}
.ob-sel{padding:7px 12px;background:var(--bg1);border:1px solid var(--b2);border-radius:8px;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--t1);outline:none;cursor:pointer}
.ob-sel:focus{border-color:var(--acc)}
.ob-inp{padding:7px 12px;background:var(--bg1);border:1px solid var(--b2);border-radius:8px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--t1);outline:none;width:90px}
.ob-inp:focus{border-color:var(--acc)}
.ob-preview{background:var(--bg1);border-radius:8px;padding:10px 13px;margin-bottom:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;border:1px solid var(--b1)}
.ob-pv{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em}
.ob-pv-v{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;color:var(--t1);margin-top:2px}

/* SOCRATE MENTOR */
.mentor-box{background:var(--bg1);border:1px solid var(--acc);border-radius:12px;overflow:hidden;margin-bottom:14px;animation:rise .2s ease}
.mentor-head{background:var(--abg);padding:11px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--b1)}
.mentor-name{font-size:12px;font-weight:500;color:var(--acc)}
.mentor-tag{font-size:10px;color:var(--t3);margin-left:auto}
.mentor-body{padding:13px 16px;font-size:13px;color:var(--t2);line-height:1.78;font-style:italic}

/* RECAP */
.recap-wrap{display:none}
.recap-wrap.on{display:block;animation:rise .25s ease}
.recap-score{text-align:center;padding:32px 20px;margin-bottom:20px}
.recap-score-val{font-family:'Playfair Display',serif;font-size:72px;font-weight:600;line-height:1}
.recap-score-label{font-size:14px;color:var(--t2);margin-top:8px}
.recap-optimal{background:var(--pill);border:1px solid var(--pur);border-radius:14px;padding:18px 20px;margin-bottom:16px}
.recap-optimal-title{font-size:12px;font-weight:500;color:var(--pur);margin-bottom:10px;letter-spacing:.05em;text-transform:uppercase}
.optimal-step{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--b1)}
.optimal-step:last-child{border-bottom:none}
.optimal-step-num{width:20px;height:20px;border-radius:50%;background:var(--pgbg);color:var(--pur);font-size:9px;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.optimal-step-text{font-size:12px;color:var(--t2);line-height:1.65}
.optimal-step-text strong{color:var(--t1);font-weight:500}

/* GRECHE PANEL */
.greche{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:10px}
.greca{background:var(--bg1);border-radius:7px;padding:8px 10px;border:1px solid var(--b1)}
.greca-l{font-size:9px;color:var(--t3);letter-spacing:.06em;margin-bottom:3px}
.greca-v{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500}

/* MINI CHART PRICE */
.price-path{stroke:var(--acc);stroke-width:1.5;fill:none}
.price-fill{fill:var(--abg)}

/* NODE RESULT OVERLAY */
.node-result{background:var(--bg1);border:1px solid var(--b1);border-radius:12px;padding:14px 16px;margin-bottom:14px;animation:rise .2s ease}
.nr-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.nr-icon{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.nr-title{font-size:13px;font-weight:500;color:var(--t1)}
.nr-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.rn{background:var(--bg2);border-radius:7px;padding:8px 10px}
.rn-l{font-size:9px;color:var(--t3);letter-spacing:.06em;margin-bottom:3px;text-transform:uppercase}
.rn-v{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500}
/* TREND CHART FULL WIDTH */
.chart-full{background:var(--pill);border:1px solid var(--b1);border-radius:12px;padding:14px 16px;margin-bottom:14px}
.chart-full-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.chart-full-title{font-size:11px;font-weight:500;color:var(--t1)}
#trend-canvas{width:100%;height:160px;display:block}
.mkt-panel{background:var(--pill);border:1px solid var(--b1);border-radius:12px;padding:14px 16px;margin-bottom:14px}


/* MOBILE */
.mob-nav{display:none}
@media(max-width:768px){
  .topbar{padding:0 14px;height:48px}
  .brand{font-size:12px}
  .ch-nav{display:none}
  .tog-lbl{display:none}
  .prog{display:none}
  .wrap{display:block}
  .sidebar{display:none}
  .content{padding:20px 16px 140px}
  .mg2,.mg3,.mg4{grid-template-columns:1fr}
  .hero-title{font-size:24px}
  .hero-lead{font-size:13px}
  .glos-grid{grid-template-columns:1fr}
  .sc-grid{grid-template-columns:1fr}
  .dec-grid{grid-template-columns:1fr}
  .mkt-panel{grid-template-columns:1fr}
  .mkt-data-grid{grid-template-columns:1fr 1fr}
  .pill-data{grid-template-columns:1fr 1fr}
  .reveal-nums{grid-template-columns:1fr 1fr}
  .mob-nav{
    display:flex;
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    z-index:9999;
    background:var(--bg1);
    border-top:1px solid var(--b1);
    box-shadow:0 -4px 16px rgba(0,0,0,.15);
    /* iOS Safari: ancora alla safe area */
    bottom:env(safe-area-inset-bottom, 0px);
    padding-bottom:0;
    min-height:60px;
    height:60px;
    margin-bottom:env(safe-area-inset-bottom, 0px);
  }
  /* Spazio per la safe area sotto la nav */
  .mob-nav::after{
    content:'';
    display:block;
    height:env(safe-area-inset-bottom, 0px);
    background:var(--bg1);
    position:fixed;
    bottom:0;left:0;right:0;
    z-index:9998;
  }
  .mob-nav-inner{display:flex;width:100%;min-height:60px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .mob-nav-inner::-webkit-scrollbar{display:none}
  .mnb{display:flex;flex-direction:column;align-items:center;justify-content:center;
    flex:1;min-width:60px;min-height:60px;padding:8px 4px;gap:4px;
    border:none;background:transparent;color:var(--t3);cursor:pointer;
    font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent}
  .mnb.on{color:var(--acc)}
  .mnb-icon{font-size:18px;line-height:1;display:block}
  .mnb-label{font-size:10px;font-weight:500;display:block;white-space:nowrap}
}

</style>
</head>

<div class="topbar">

/* ================================================================
   BLACK-SCHOLES ENGINE
================================================================ */
function bs(S,K,T,r,sigma,type){
  // S=spot K=strike T=time_years r=rate sigma=IV type='call'|'put'
  if(T<=0)return Math.max(0,type==='call'?S-K:K-S);
  var d1=(Math.log(S/K)+(r+sigma*sigma/2)*T)/(sigma*Math.sqrt(T));
  var d2=d1-sigma*Math.sqrt(T);
  function N(x){
    var t=1/(1+0.2316419*Math.abs(x));
    var d=0.3989423*Math.exp(-x*x/2);
    var p=d*t*(0.3193815+t*(-0.3565638+t*(1.7814779+t*(-1.8212560+t*1.3302744))));
    return x>=0?1-p:p;
  }
  if(type==='call')return S*N(d1)-K*Math.exp(-r*T)*N(d2);
  return K*Math.exp(-r*T)*N(-d2)-S*N(-d1);
}

function greeks(S,K,T,r,sigma,type){
  if(T<=0)return{delta:type==='call'?1:0,gamma:0,theta:0,vega:0,rho:0};
  function N(x){var t=1/(1+0.2316419*Math.abs(x));var d=0.3989423*Math.exp(-x*x/2);var p=d*t*(0.3193815+t*(-0.3565638+t*(1.7814779+t*(-1.8212560+t*1.3302744))));return x>=0?1-p:p;}
  function npdf(x){return Math.exp(-x*x/2)/Math.sqrt(2*Math.PI);}
  var d1=(Math.log(S/K)+(r+sigma*sigma/2)*T)/(sigma*Math.sqrt(T));
  var d2=d1-sigma*Math.sqrt(T);
  var delta=type==='call'?N(d1):N(d1)-1;
  var gamma=npdf(d1)/(S*sigma*Math.sqrt(T));
  var theta=type==='call'?
    (-S*npdf(d1)*sigma/(2*Math.sqrt(T))-r*K*Math.exp(-r*T)*N(d2))/365:
    (-S*npdf(d1)*sigma/(2*Math.sqrt(T))+r*K*Math.exp(-r*T)*N(-d2))/365;
  var vega=S*npdf(d1)*Math.sqrt(T)/100;
  var rho=type==='call'?K*T*Math.exp(-r*T)*N(d2)/100:-K*T*Math.exp(-r*T)*N(-d2)/100;
  return{delta:Math.round(delta*1000)/1000,gamma:Math.round(gamma*10000)/10000,
    theta:Math.round(theta*1000)/1000,vega:Math.round(vega*1000)/1000,rho:Math.round(rho*1000)/1000};
}

/* ================================================================
   PRICE TREND GENERATOR
   Genera una serie di prezzi realistica per tutto lo scenario
================================================================ */
function generatePriceTrend(){
  if(!currentScenario||!currentNode)return;
  var nodes=currentScenario.nodes;
  var spotNodes=nodes.filter(function(n){return n.market&&n.market.spot;});
  if(spotNodes.length<2){priceHistory=[currentNode.market.spot];return;}

  // Raccogli tutti i prezzi spot dai nodi in ordine di day
  var keyPoints=spotNodes.filter(function(n){return typeof n.day==='number';})
    .sort(function(a,b){return a.day-b.day;})
    .filter(function(n,i,arr){return i===0||n.day!==arr[i-1].day;});

  // Genera ~60 punti interpolati con rumore realistico
  priceHistory=[];
  for(var i=0;i<keyPoints.length-1;i++){
    var p0=keyPoints[i], p1=keyPoints[i+1];
    var steps=Math.max(6, (p1.day-p0.day)*2);
    var s0=p0.market.spot, s1=p1.market.spot;
    for(var j=0;j<steps;j++){
      var t=j/steps;
      // Interpolazione con rumore gaussiano
      var base=s0+(s1-s0)*t;
      var noise=(Math.random()-0.5)*2*(Math.abs(s1-s0)*0.15+s0*0.003);
      // Evento: spike di volatilità a metà tra i nodi
      if(p1.type==='event'&&j===Math.floor(steps*0.6)){
        noise+=(s1-s0)*0.4;
      }
      priceHistory.push(Math.round((base+noise)*100)/100);
    }
  }
  // Aggiungi punto finale
  priceHistory.push(keyPoints[keyPoints.length-1].market.spot);
}

/* ================================================================
   CURRENT PRICE TREND INDEX
   Mappa il nodo corrente a un indice nel trend
================================================================ */
function getTrendIndex(){
  if(!currentScenario||!currentNode)return priceHistory.length-1;
  var nodes=currentScenario.nodes;
  var keyPoints=nodes.filter(function(n){return n.market&&n.market.spot&&typeof n.day==='number';})
    .sort(function(a,b){return a.day-b.day;})
    .filter(function(n,i,arr){return i===0||n.day!==arr[i-1].day;});
  var idx=keyPoints.findIndex(function(n){return n.id===currentNode.id;});
  if(idx<0){
    // Trova il keypoint più vicino per day
    var curDay=currentNode.day||0;
    var best=0;
    keyPoints.forEach(function(n,i){if(n.day<=curDay)best=i;});
    idx=best;
  }
  // Mappa idx al range di priceHistory
  var segmentSize=Math.floor(priceHistory.length/Math.max(1,keyPoints.length-1));
  return Math.min(priceHistory.length-1, idx*segmentSize);
}

   TREND CHART — HTML shell, canvas riempito da renderTrendCanvas
================================================================ */
function buildTrendChart(){

function renderTrendCanvas(){
  var canvas=document.getElementById('trend-canvas');
  if(!canvas)return;
  var w=canvas.offsetWidth||600;
  var h=160;
  canvas.width=w; canvas.height=h;
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,w,h);

  var data=priceHistory;
  if(!data||data.length<2)return;

  var trendIdx=getTrendIndex();
  var visibleData=data.slice(0,trendIdx+1);
  if(visibleData.length<2)visibleData=data.slice(0,2);

  var minP=Math.min.apply(null,data)*0.997;
  var maxP=Math.max.apply(null,data)*1.003;
  var rng=maxP-minP||1;
  var pad={l:40,r:20,t:14,b:24};
  var cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;

  function px(i,arr){return pad.l+i/(Math.max(arr.length-1,1))*cw;}
  function py(v){return pad.t+ch-(v-minP)/rng*ch;}

  // Grid lines
  ctx.strokeStyle='rgba(128,128,128,0.1)';ctx.lineWidth=1;
  [0.25,0.5,0.75,1].forEach(function(t){
    var y=pad.t+ch*(1-t);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cw,y);ctx.stroke();
    var v=minP+rng*t;
    ctx.fillStyle='rgba(128,128,128,0.5)';ctx.font='9px JetBrains Mono,monospace';
    ctx.fillText('$'+Math.round(v),2,y+3);
  });

  var dark=document.documentElement.getAttribute('data-t')==='dark';
  var lineColor=dark?'#e05a1a':'#c0420a';
  var futureColor=dark?'rgba(255,255,255,0.12)':'rgba(0,0,0,0.08)';

  // Future path (grigio)
  if(trendIdx<data.length-1){
    var futureData=data.slice(trendIdx);
    ctx.beginPath();
    ctx.strokeStyle=futureColor;ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
    futureData.forEach(function(v,i){
      var xi=pad.l+(trendIdx+i)/(data.length-1)*cw;
      var yi=py(v);
      i===0?ctx.moveTo(xi,yi):ctx.lineTo(xi,yi);
    });
    ctx.stroke();ctx.setLineDash([]);
  }

  // Fill area sotto la linea visible
  ctx.beginPath();
  visibleData.forEach(function(v,i){
    var xi=px(i,visibleData), yi=py(v);
    i===0?ctx.moveTo(xi,yi):ctx.lineTo(xi,yi);
  });
  ctx.lineTo(px(visibleData.length-1,visibleData),pad.t+ch);
  ctx.lineTo(px(0,visibleData),pad.t+ch);
  ctx.closePath();
  var grad=ctx.createLinearGradient(0,pad.t,0,pad.t+ch);
  grad.addColorStop(0,dark?'rgba(224,90,26,0.28)':'rgba(192,66,10,0.18)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grad;ctx.fill();

  // Linea principale
  ctx.beginPath();
  ctx.strokeStyle=lineColor;ctx.lineWidth=2;
  visibleData.forEach(function(v,i){
    var xi=px(i,visibleData), yi=py(v);
    i===0?ctx.moveTo(xi,yi):ctx.lineTo(xi,yi);
  });
  ctx.stroke();

  // Dot corrente
  var cx2=px(visibleData.length-1,visibleData);
  var cy2=py(visibleData[visibleData.length-1]);
  ctx.beginPath();ctx.arc(cx2,cy2,5,0,Math.PI*2);
  ctx.fillStyle=lineColor;ctx.fill();
  ctx.beginPath();ctx.arc(cx2,cy2,3,0,Math.PI*2);
  ctx.fillStyle=dark?'#0a0a0a':'#fff';ctx.fill();

  // Label prezzo corrente
  ctx.fillStyle=lineColor;ctx.font='bold 10px JetBrains Mono,monospace';
  ctx.fillText('$'+currentNode.market.spot, cx2+8, cy2+4);

  // Evento marker
  if(currentNode.type==='event'){
    var el=document.getElementById('chart-event-label');
    if(el){el.style.display='inline';el.textContent=currentNode.event?currentNode.event.replace('⚡ ',''):'Evento';}
    // Vertical line
    ctx.beginPath();ctx.strokeStyle='rgba(251,191,36,0.5)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.moveTo(cx2,pad.t);ctx.lineTo(cx2,pad.t+ch);ctx.stroke();ctx.setLineDash([]);
  }

  // Asse x — giorni chiave
  ctx.fillStyle='rgba(128,128,128,0.5)';ctx.font='9px JetBrains Mono,monospace';
  var kp=currentScenario.nodes.filter(function(n){return n.market&&n.day;})
    .sort(function(a,b){return a.day-b.day;})
    .filter(function(n,i,arr){return i===0||n.day!==arr[i-1].day;});
  kp.forEach(function(n){
    var idxK=Math.round((kp.indexOf(n)/(Math.max(kp.length-1,1)))*( data.length-1));
    var xk=pad.l+idxK/(data.length-1)*cw;
    ctx.fillText('g'+n.day, xk-8, h-6);
  });
}

/* ================================================================
   POSITIONS PANEL
================================================================ */
function buildPositionsPanel(mkt){
  if(positions.length===0){
    return '<div class="pos-panel"><div class="pos-head"><span class="pos-title">Posizioni aperte</span>'+
    '<span style="font-size:11px;color:var(--t3)">Nessuna</span></div>'+
    '<div class="no-pos">Nessuna posizione aperta.</div></div>';
  }
  var total=calcTotalPnL(mkt);
  var tColor=total>=0?'var(--grn)':'var(--red)';
  var rows='';
  positions.forEach(function(p,idx){
    var T=Math.max(0.001,p.dte_rem/365);
    var strike=typeof p.strike==='number'?p.strike:parseInt(p.strike)||p.data.strike||450;
    var ptype=p.type.toLowerCase().indexOf('put')>=0?'put':'call';
    var price;
    try{ price=bs(mkt.spot,strike,T,mkt.rate||0.05,mkt.iv||p.iv,ptype); }
    catch(e){ price=p.entry_price; }
    var pnl=Math.round((price-p.entry_price)*p.contracts*100*(p.short?-1:1));
    var pColor=pnl>=0?'var(--grn)':'var(--red)';
    var G;
    try{ G=greeks(mkt.spot,strike,T,mkt.rate||0.05,mkt.iv||p.iv,ptype); }
    catch(e){ G={delta:0,theta:0,vega:0,gamma:0}; }
    rows+='<tr>'+
    '<td><span class="badge '+(p.short?'br':'ba')+'">'+(p.short?'S ':'L ')+p.type+'</span></td>'+
    '<td>'+p.strike+'</td>'+
    '<td>'+p.dte_rem+'</td>'+
    '<td>$'+p.entry_price.toFixed(2)+'</td>'+
    '<td>$'+price.toFixed(2)+'</td>'+
    '<td style="color:'+pColor+'">'+(pnl>=0?'+':'')+fmtDollar(pnl)+'</td>'+
    '<td>'+G.delta.toFixed(2)+'</td>'+
    '<td>'+G.theta.toFixed(3)+'</td>'+
    '<td>'+G.vega.toFixed(3)+'</td>'+
    '<td><button class="pos-act" data-pidx="'+idx+'" onclick="closePosition(parseInt(this.dataset.pidx))">✕</button></td>'+
    '</tr>';
  });
  return '<div class="pos-panel">'+
  '<div class="pos-head">'+
  '<span class="pos-title">Posizioni aperte ('+positions.length+')</span>'+
  '<span class="pos-pandl" style="color:'+tColor+'">'+(total>=0?'+':'')+fmtDollar(total)+'</span>'+
  '</div>'+
  '<div style="overflow-x:auto">'+
  '<table class="pos-table"><tr><th>Tipo</th><th>Strike</th><th>DTE</th><th>Entrata</th><th>Val.att.</th><th>P&L</th><th>Δ</th><th>θ</th><th>ν</th><th></th></tr>'+
  rows+'</table></div></div>';
}

/* ================================================================
   MAKE DECISION
================================================================ */
function makeDecision(decId){
  if(!currentNode||!decId)return;
  var dec=null;
  for(var i=0;i<currentNode.decisions.length;i++){
    if(currentNode.decisions[i].id===decId){dec=currentNode.decisions[i];break;}
  }
  if(!dec)return;

  // Disabilita bottoni subito
  var btns=document.querySelectorAll('.dec-btn');
  btns.forEach(function(b){b.disabled=true;b.style.opacity='0.5';});

  var T=0.08;

  // Applica posizione se params presenti
  if(dec.params){
    var p=dec.params;
    T=Math.max(0.001,(p.dte||30)/365);
    try{
      if(p.type==='iron_condor'){
        var ps=bs(p.spot,p.put_strike_h,T,0.05,p.iv,'put');
        var pb=bs(p.spot,p.put_strike_l,T,0.05,p.iv,'put');
        var cs=bs(p.spot,p.call_strike_l,T,0.05,p.iv,'call');
        var cb=bs(p.spot,p.call_strike_h,T,0.05,p.iv,'call');
        var prem=ps-pb+cs-cb;
        positions.push({id:decId,type:'Iron Condor',strike:p.put_strike_l+'/'+p.call_strike_h,
          dte_rem:p.dte||30,entry_price:prem,contracts:p.contracts||1,short:true,
          iv:p.iv,rate:0.05,spot_entry:p.spot,data:p,complex:true});
      } else if(p.type==='straddle'){
        var cp=bs(p.spot,p.strike,T,0.05,p.iv,'call');
        var pp=bs(p.spot,p.strike,T,0.05,p.iv,'put');
        var tot=cp+pp;
        positions.push({id:decId,type:'Straddle',strike:p.strike,
          dte_rem:p.dte||14,entry_price:tot,contracts:p.contracts||1,short:!!p.short,
          iv:p.iv,rate:0.05,spot_entry:p.spot,data:p});
      } else if(p.type==='bull_spread'||p.type==='put_spread'){
        var isC=p.type==='bull_spread';
        var sl=isC?(p.strike_l||p.strike):( p.strike_h||p.strike);
        var sh=isC?(p.strike_h||p.strike+10):(p.strike_l||p.strike-5);
        var lp=bs(p.spot,sl,T,0.05,p.iv,isC?'call':'put');
        var sp2=bs(p.spot,sh,T,0.05,p.iv,isC?'call':'put');
        var net=Math.abs(lp-sp2);
        positions.push({id:decId,type:isC?'Bull Spread':'Put Spread',strike:sl+'/'+sh,
          dte_rem:p.dte||30,entry_price:net,contracts:p.contracts||1,short:!!p.short,
          iv:p.iv,rate:0.05,spot_entry:p.spot,data:p});
      } else {
        var pr=bs(p.spot,p.strike,T,0.05,p.iv,p.type==='put'?'put':'call');
        positions.push({id:decId,type:p.type,strike:p.strike,
          dte_rem:p.dte||30,entry_price:pr,contracts:p.contracts||1,short:!!p.short,
          iv:p.iv,rate:0.05,spot_entry:p.spot,data:p});
      }
    } catch(e){ console.warn('Position error:',e); }
  }

  // Naviga al nodo successivo
  var nextId=dec.next;
  if(nextId==='recap'){
    decHistory.push({nodeId:currentNode.id,decId:decId,label:dec.label,
      mentor:dec.mentor_text,quality:dec.quality,pnlDelta:0});
    showRecap();
    return;
  }

  var nextNode=currentScenario.nodes.find(function(n){return n.id===nextId;});
  if(!nextNode){
    // Nodo non trovato — mostra errore nel mentor
    decHistory.push({nodeId:currentNode.id,decId:decId,label:dec.label,
      mentor:dec.mentor_text||'',quality:dec.quality,pnlDelta:0});
    renderSimulatore();
    return;
  }

  // Aggiorna DTE posizioni
  var daysDiff=Math.max(0,(nextNode.day||0)-(currentNode.day||0));
  positions.forEach(function(pos){
    pos.dte_rem=Math.max(0,pos.dte_rem-daysDiff);
  });

  // Calcola P&L delta
  var pnlDelta=calcTotalPnL(nextNode.market);

  // Registra in history
  decHistory.push({nodeId:currentNode.id,decId:decId,label:dec.label,
    mentor:dec.mentor_text||'',quality:dec.quality,pnlDelta:pnlDelta});

  // Aggiorna stato
  currentNode=nextNode;
  nodeCount++;
  capital=startCapital+calcTotalPnL(nextNode.market);

  // Re-render
  renderSimulatore();
  var cont=document.getElementById('content');
  if(cont) cont.scrollTo({top:0,behavior:'smooth'});
}

function closePosition(idx){
  if(!currentNode||isNaN(idx))return;
  var mkt=currentNode.market;
  var p=positions[idx];
  if(!p)return;
  var T=Math.max(0.001,p.dte_rem/365);
  var strike=typeof p.strike==='number'?p.strike:parseInt(p.strike)||450;
  var ptype=p.type.toLowerCase().indexOf('put')>=0?'put':'call';
  var price;
  try{ price=bs(mkt.spot,strike,T,mkt.rate||0.05,mkt.iv||p.iv,ptype); }
  catch(e){ price=p.entry_price; }
  var pnl=Math.round((price-p.entry_price)*p.contracts*100*(p.short?-1:1));
  positions.splice(idx,1);
  capital=startCapital+calcTotalPnL(mkt);
  decHistory.push({nodeId:currentNode.id,decId:'close_'+idx,
    label:'Chiusa posizione #'+(idx+1),
    mentor:'Posizione chiusa. P&L realizzato: '+(pnl>=0?'+':'')+fmtDollar(pnl)+'.',
    quality:pnl>=0?'good':'neutral',pnlDelta:pnl});
  renderSimulatore();
}

/* ================================================================
   P&L
================================================================ */
function calcTotalPnL(mkt){
  var total=0;
  positions.forEach(function(p){
    var T=Math.max(0.001,p.dte_rem/365);
    var strike=typeof p.strike==='number'?p.strike:parseInt(p.strike)||450;
    var ptype=p.type.toLowerCase().indexOf('put')>=0?'put':'call';
    var price;
    try{ price=bs(mkt.spot,strike,T,mkt.rate||0.05,mkt.iv||p.iv,ptype); }
    catch(e){ price=p.entry_price; }
    total+=(price-p.entry_price)*p.contracts*100*(p.short?-1:1);
  });
  return Math.round(total);
}

/* ================================================================
   RECAP
================================================================ */
function showRecap(){
  var pnl=capital-startCapital;
  var score=calcScore();
  var decs=decHistory.filter(function(h){return h.decId.indexOf('close_')<0;});
  archive.push({id:currentScenario.id,title:currentScenario.title,
    pnl:pnl,score:score,date:new Date().toLocaleDateString('it-IT'),
    bias:getDomBias(decs),
    decisions:decs.map(function(h){return {label:h.label,quality:h.quality,mentor:h.mentor||''};})});
  var good=decs.filter(function(h){return h.quality==='optimal'||h.quality==='good'||h.quality==='advanced';}).length;
  var bad=decs.filter(function(h){return h.quality==='terrible'||h.quality==='bad';}).length;

  var scoreColor=score>=75?'var(--grn)':score>=50?'var(--amb)':'var(--red)';
  var pColor=pnl>=0?'var(--grn)':'var(--red)';

  var cont=document.getElementById('sim-content');
  if(!cont)return;

  var html='<div style="text-align:center;padding:32px 20px 20px">'+
  '<div style="font-family:\'Playfair Display\',serif;font-size:72px;font-weight:600;color:'+scoreColor+';line-height:1">'+score+'</div>'+
  '<div style="font-size:13px;color:var(--t2);margin-top:6px">Score decisionale su 100</div>'+
  '</div>'+
  '<div class="mg mg4" style="margin-bottom:20px">'+
  '<div class="mc"><div class="mc-l">Capitale finale</div><div class="mc-v" style="color:'+pColor+'">'+(pnl>=0?'+':'')+fmtDollar(pnl)+'</div><div class="mc-s">su $'+startCapital.toLocaleString()+' iniziali</div></div>'+
  '<div class="mc"><div class="mc-l">Mosse corrette</div><div class="mc-v" style="color:var(--grn)">'+good+'</div><div class="mc-s">su '+decs.length+' totali</div></div>'+
  '<div class="mc"><div class="mc-l">Mosse errate</div><div class="mc-v" style="color:'+(bad>0?'var(--red)':'var(--t1)')+'">'+bad+'</div><div class="mc-s">errori significativi</div></div>'+
  '<div class="mc"><div class="mc-l">Bias rilevato</div><div class="mc-v" style="font-size:12px;color:var(--pur)">'+getDomBias(decs)+'</div></div>'+
  '</div>'+

  '<div style="font-size:10px;font-weight:500;letter-spacing:.1em;color:var(--t3);text-transform:uppercase;margin-bottom:10px">Il tuo percorso</div>'+
  '<div style="background:var(--pill);border:1px solid var(--b1);border-radius:12px;padding:14px 16px;margin-bottom:16px">';

  decs.forEach(function(h){
    var q=h.quality;
    var ok=q==='optimal'||q==='good'||q==='advanced';
    var bad2=q==='terrible'||q==='bad';
    var clr=ok?'var(--grn)':bad2?'var(--red)':'var(--amb)';
    var ic=ok?'✓':bad2?'✗':'→';
    html+='<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--b1)">'+
    '<div style="width:18px;height:18px;border-radius:50%;background:'+clr.replace('var(--','rgba(').replace(')',',.15)')+';color:'+clr+';font-size:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px">'+ic+'</div>'+
    '<div><div style="font-size:12px;color:var(--t1);font-weight:500">'+h.label+'</div>'+
    '<div style="font-size:11px;color:var(--t2);margin-top:2px;line-height:1.6;font-style:italic">'+h.mentor+'</div></div></div>';
  });
  html+='</div>';

  // Percorso ottimale
  html+='<div style="font-size:10px;font-weight:500;letter-spacing:.1em;color:var(--t3);text-transform:uppercase;margin-bottom:10px">Percorso ottimale — '+currentScenario.optimalBias+'</div>'+
  '<div style="background:var(--pill);border:1px solid var(--pur);border-radius:12px;padding:14px 16px;margin-bottom:16px">'+
  buildOptimalPath()+
  '<div style="margin-top:10px;font-size:12px;color:var(--pur);font-family:\'JetBrains Mono\',monospace">P&L ottimale: '+(currentScenario.optimalPnl>=0?'+':'')+'$'+currentScenario.optimalPnl+'</div>'+
  '</div>'+

  '<div class="btn-row">'+
  '<button class="btn-p" onclick="restartScenario()">Rigioca daccapo</button>'+
  '<button class="btn-g" onclick="S_go(1)">Scegli altro scenario</button>'+
  '</div>';

  cont.innerHTML=html;
}

function getDomBias(decs){
  var c={loss_aversion:0,sunk_cost:0,overconfidence:0};
  decs.forEach(function(h){
    if(h.quality==='bad'||h.quality==='terrible'){
      if(h.label.toLowerCase().indexOf('tengo')>=0) c.loss_aversion++;
      if(h.label.toLowerCase().indexOf('aggiungo')>=0) c.sunk_cost++;
      if(h.label.toLowerCase().indexOf('rimbalz')>=0) c.overconfidence++;
    }
  });
  var max=0,dom='—';
  Object.keys(c).forEach(function(k){if(c[k]>max){max=c[k];dom=k==='loss_aversion'?'Loss Aversion':k==='sunk_cost'?'Sunk Cost':'Overconfidence';}});
  return dom;
}

function buildOptimalPath(){
  var html='';
  var optDecs=currentScenario.optimalPath;
  var nodes=currentScenario.nodes;
  var cur=nodes[0];
  var step=1;
  var seen={};
  while(cur&&step<=8){
    if(seen[cur.id])break;
    seen[cur.id]=true;
    var od=cur.decisions.find(function(d){return optDecs.indexOf(d.id)>=0;});
    if(!od) od=cur.decisions.find(function(d){return d.quality==='optimal';});
    if(!od) break;
    html+='<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--b1)">'+
    '<div style="width:18px;height:18px;border-radius:50%;background:var(--pgbg);color:var(--pur);font-size:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-family:\'JetBrains Mono\',monospace">'+step+'</div>'+
    '<div style="font-size:12px;color:var(--t2);line-height:1.6"><strong style="color:var(--t1)">'+cur.label+':</strong> '+od.label+'</div></div>';
    cur=nodes.find(function(n){return n.id===od.next;});
    step++;
  }
  return html||'<div style="font-size:12px;color:var(--t3)">Percorso ottimale non disponibile per questo scenario.</div>';
}

function calcScore(){
  var decs=decHistory.filter(function(h){return h.decId.indexOf('close_')<0;});
  if(!decs.length) return 0;
  var pts=0;
  decs.forEach(function(h){
    pts+=h.quality==='optimal'?100:h.quality==='good'||h.quality==='advanced'?75:
         h.quality==='suboptimal'||h.quality==='risky'?40:h.quality==='bad'?15:
         h.quality==='terrible'?0:50;
  });
  return Math.round(pts/decs.length);
}

function restartScenario(){
  if(currentScenario) startScenario(currentScenario.id);
  else S_go(1);
}

/* ================================================================
   SIDEBAR
================================================================ */
function updateSidebar(){
  var delta=capital-startCapital;
  var pct=Math.round(delta/startCapital*1000)/10;
  var col=delta>=0?'var(--grn)':delta<-startCapital*0.2?'var(--red)':'var(--amb)';
  var capEl=document.getElementById('sb-cap');
  var delEl=document.getElementById('sb-delta');
  var fillEl=document.getElementById('cap-fill');
  var sessEl=document.getElementById('sb-session');
  if(capEl){capEl.textContent='$'+Math.round(capital).toLocaleString();capEl.style.color=col;}
  if(delEl){delEl.textContent=(delta>=0?'+':'')+fmtDollar(delta)+' ('+pct+'%)';delEl.style.color=col;}
  if(fillEl){
    var pct2=Math.max(5,Math.min(100,capital/startCapital*100));
    fillEl.style.width=pct2+'%';
    fillEl.style.background=pct2>=90?'var(--grn)':pct2>=70?'var(--amb)':'var(--red)';
  }
  if(sessEl&&currentScenario){
    sessEl.innerHTML='<strong style="color:var(--t1)">'+currentScenario.title+'</strong><br>'+
    'Nodo: '+(currentNode?currentNode.label:'—')+'<br>'+
    'Mosse: '+decHistory.length+'<br>Posizioni: '+positions.length;
  }
}

/* ================================================================
   BLACK-SCHOLES ENGINE
================================================================ */
function bs(S,K,T,r,sigma,type){
  // S=spot K=strike T=time_years r=rate sigma=IV type='call'|'put'
  if(T<=0)return Math.max(0,type==='call'?S-K:K-S);
  var d1=(Math.log(S/K)+(r+sigma*sigma/2)*T)/(sigma*Math.sqrt(T));
  var d2=d1-sigma*Math.sqrt(T);
  function N(x){
    var t=1/(1+0.2316419*Math.abs(x));
    var d=0.3989423*Math.exp(-x*x/2);
    var p=d*t*(0.3193815+t*(-0.3565638+t*(1.7814779+t*(-1.8212560+t*1.3302744))));
    return x>=0?1-p:p;
  }
  if(type==='call')return S*N(d1)-K*Math.exp(-r*T)*N(d2);
  return K*Math.exp(-r*T)*N(-d2)-S*N(-d1);
}

function greeks(S,K,T,r,sigma,type){
  if(T<=0)return{delta:type==='call'?1:0,gamma:0,theta:0,vega:0,rho:0};
  function N(x){var t=1/(1+0.2316419*Math.abs(x));var d=0.3989423*Math.exp(-x*x/2);var p=d*t*(0.3193815+t*(-0.3565638+t*(1.7814779+t*(-1.8212560+t*1.3302744))));return x>=0?1-p:p;}
  function npdf(x){return Math.exp(-x*x/2)/Math.sqrt(2*Math.PI);}
  var d1=(Math.log(S/K)+(r+sigma*sigma/2)*T)/(sigma*Math.sqrt(T));
  var d2=d1-sigma*Math.sqrt(T);
  var delta=type==='call'?N(d1):N(d1)-1;
  var gamma=npdf(d1)/(S*sigma*Math.sqrt(T));
  var theta=type==='call'?
    (-S*npdf(d1)*sigma/(2*Math.sqrt(T))-r*K*Math.exp(-r*T)*N(d2))/365:
    (-S*npdf(d1)*sigma/(2*Math.sqrt(T))+r*K*Math.exp(-r*T)*N(-d2))/365;
  var vega=S*npdf(d1)*Math.sqrt(T)/100;
  var rho=type==='call'?K*T*Math.exp(-r*T)*N(d2)/100:-K*T*Math.exp(-r*T)*N(-d2)/100;
  return{delta:Math.round(delta*1000)/1000,gamma:Math.round(gamma*10000)/10000,
    theta:Math.round(theta*1000)/1000,vega:Math.round(vega*1000)/1000,rho:Math.round(rho*1000)/1000};
}

/* ================================================================
   PRICE TREND GENERATOR
   Genera una serie di prezzi realistica per tutto lo scenario
================================================================ */
function generatePriceTrend(){
  if(!currentScenario||!currentNode)return;
  var nodes=currentScenario.nodes;
  var spotNodes=nodes.filter(function(n){return n.market&&n.market.spot;});
  if(spotNodes.length<2){priceHistory=[currentNode.market.spot];return;}

  // Raccogli tutti i prezzi spot dai nodi in ordine di day
  var keyPoints=spotNodes.filter(function(n){return typeof n.day==='number';})
    .sort(function(a,b){return a.day-b.day;})
    .filter(function(n,i,arr){return i===0||n.day!==arr[i-1].day;});

  // Genera ~60 punti interpolati con rumore realistico
  priceHistory=[];
  for(var i=0;i<keyPoints.length-1;i++){
    var p0=keyPoints[i], p1=keyPoints[i+1];
    var steps=Math.max(6, (p1.day-p0.day)*2);
    var s0=p0.market.spot, s1=p1.market.spot;
    for(var j=0;j<steps;j++){
      var t=j/steps;
      // Interpolazione con rumore gaussiano
      var base=s0+(s1-s0)*t;
      var noise=(Math.random()-0.5)*2*(Math.abs(s1-s0)*0.15+s0*0.003);
      // Evento: spike di volatilità a metà tra i nodi
      if(p1.type==='event'&&j===Math.floor(steps*0.6)){
        noise+=(s1-s0)*0.4;
      }
      priceHistory.push(Math.round((base+noise)*100)/100);
    }
  }
  // Aggiungi punto finale
  priceHistory.push(keyPoints[keyPoints.length-1].market.spot);
}

/* ================================================================
   CURRENT PRICE TREND INDEX
   Mappa il nodo corrente a un indice nel trend
================================================================ */
function getTrendIndex(){
  if(!currentScenario||!currentNode)return priceHistory.length-1;
  var nodes=currentScenario.nodes;
  var keyPoints=nodes.filter(function(n){return n.market&&n.market.spot&&typeof n.day==='number';})
    .sort(function(a,b){return a.day-b.day;})
    .filter(function(n,i,arr){return i===0||n.day!==arr[i-1].day;});
  var idx=keyPoints.findIndex(function(n){return n.id===currentNode.id;});
  if(idx<0){
    // Trova il keypoint più vicino per day
    var curDay=currentNode.day||0;
    var best=0;
    keyPoints.forEach(function(n,i){if(n.day<=curDay)best=i;});
    idx=best;
  }
  // Mappa idx al range di priceHistory
  var segmentSize=Math.floor(priceHistory.length/Math.max(1,keyPoints.length-1));
  return Math.min(priceHistory.length-1, idx*segmentSize);
}

function renderTrendCanvas(){
  var canvas=document.getElementById('trend-canvas');
  if(!canvas)return;
  var w=canvas.offsetWidth||600;
  var h=160;
  canvas.width=w; canvas.height=h;
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,w,h);

  var data=priceHistory;
  if(!data||data.length<2)return;

  var trendIdx=getTrendIndex();
  var visibleData=data.slice(0,trendIdx+1);
  if(visibleData.length<2)visibleData=data.slice(0,2);

  var minP=Math.min.apply(null,data)*0.997;
  var maxP=Math.max.apply(null,data)*1.003;
  var rng=maxP-minP||1;
  var pad={l:40,r:20,t:14,b:24};
  var cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;

  function px(i,arr){return pad.l+i/(Math.max(arr.length-1,1))*cw;}
  function py(v){return pad.t+ch-(v-minP)/rng*ch;}

  // Grid lines
  ctx.strokeStyle='rgba(128,128,128,0.1)';ctx.lineWidth=1;
  [0.25,0.5,0.75,1].forEach(function(t){
    var y=pad.t+ch*(1-t);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cw,y);ctx.stroke();
    var v=minP+rng*t;
    ctx.fillStyle='rgba(128,128,128,0.5)';ctx.font='9px JetBrains Mono,monospace';
    ctx.fillText('$'+Math.round(v),2,y+3);
  });

  var dark=document.documentElement.getAttribute('data-t')==='dark';
  var lineColor=dark?'#e05a1a':'#c0420a';
  var futureColor=dark?'rgba(255,255,255,0.12)':'rgba(0,0,0,0.08)';

  // Future path (grigio)
  if(trendIdx<data.length-1){
    var futureData=data.slice(trendIdx);
    ctx.beginPath();
    ctx.strokeStyle=futureColor;ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
    futureData.forEach(function(v,i){
      var xi=pad.l+(trendIdx+i)/(data.length-1)*cw;
      var yi=py(v);
      i===0?ctx.moveTo(xi,yi):ctx.lineTo(xi,yi);
    });
    ctx.stroke();ctx.setLineDash([]);
  }

  // Fill area sotto la linea visible
  ctx.beginPath();
  visibleData.forEach(function(v,i){
    var xi=px(i,visibleData), yi=py(v);
    i===0?ctx.moveTo(xi,yi):ctx.lineTo(xi,yi);
  });
  ctx.lineTo(px(visibleData.length-1,visibleData),pad.t+ch);
  ctx.lineTo(px(0,visibleData),pad.t+ch);
  ctx.closePath();
  var grad=ctx.createLinearGradient(0,pad.t,0,pad.t+ch);
  grad.addColorStop(0,dark?'rgba(224,90,26,0.28)':'rgba(192,66,10,0.18)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grad;ctx.fill();

  // Linea principale
  ctx.beginPath();
  ctx.strokeStyle=lineColor;ctx.lineWidth=2;
  visibleData.forEach(function(v,i){
    var xi=px(i,visibleData), yi=py(v);
    i===0?ctx.moveTo(xi,yi):ctx.lineTo(xi,yi);
  });
  ctx.stroke();

  // Dot corrente
  var cx2=px(visibleData.length-1,visibleData);
  var cy2=py(visibleData[visibleData.length-1]);
  ctx.beginPath();ctx.arc(cx2,cy2,5,0,Math.PI*2);
  ctx.fillStyle=lineColor;ctx.fill();
  ctx.beginPath();ctx.arc(cx2,cy2,3,0,Math.PI*2);
  ctx.fillStyle=dark?'#0a0a0a':'#fff';ctx.fill();

  // Label prezzo corrente
  ctx.fillStyle=lineColor;ctx.font='bold 10px JetBrains Mono,monospace';
  ctx.fillText('$'+currentNode.market.spot, cx2+8, cy2+4);

  // Evento marker
  if(currentNode.type==='event'){
    var el=document.getElementById('chart-event-label');
    if(el){el.style.display='inline';el.textContent=currentNode.event?currentNode.event.replace('⚡ ',''):'Evento';}
    // Vertical line
    ctx.beginPath();ctx.strokeStyle='rgba(251,191,36,0.5)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.moveTo(cx2,pad.t);ctx.lineTo(cx2,pad.t+ch);ctx.stroke();ctx.setLineDash([]);
  }

  // Asse x — giorni chiave
  ctx.fillStyle='rgba(128,128,128,0.5)';ctx.font='9px JetBrains Mono,monospace';
  var kp=currentScenario.nodes.filter(function(n){return n.market&&n.day;})
    .sort(function(a,b){return a.day-b.day;})
    .filter(function(n,i,arr){return i===0||n.day!==arr[i-1].day;});
  kp.forEach(function(n){
    var idxK=Math.round((kp.indexOf(n)/(Math.max(kp.length-1,1)))*( data.length-1));
    var xk=pad.l+idxK/(data.length-1)*cw;
    ctx.fillText('g'+n.day, xk-8, h-6);
  });
}

function buildPositionsPanel(mkt){
  if(positions.length===0){
    return '<div class="pos-panel"><div class="pos-head"><span class="pos-title">Posizioni aperte</span>'+
    '<span style="font-size:11px;color:var(--t3)">Nessuna</span></div>'+

  }

    var T=Math.max(0.001,p.dte_rem/365);

    var ptype=p.type.toLowerCase().indexOf('put')>=0?'put':'call';

    var pColor=pnl>=0?'var(--grn)':'var(--red)';
    var G;

    catch(e){ G={delta:0,theta:0,vega:0,gamma:0}; }
    rows+='<tr>'+

    '<td>'+p.strike+'</td>'+

    '<td>'+G.delta.toFixed(2)+'</td>'+
    '<td>'+G.theta.toFixed(3)+'</td>'+

    '<td><button class="pos-act" data-pidx="'+idx+'" onclick="closePosition(parseInt(this.dataset.pidx))">✕</button></td>'+
    '</tr>';
  });
  return '<div class="pos-panel">'+
  '<div class="pos-head">'+
  '<span class="pos-title">Posizioni aperte ('+positions.length+')</span>'+
  '<span class="pos-pandl" style="color:'+tColor+'">'+(total>=0?'+':'')+fmtDollar(total)+'</span>'+
  '</div>'+

  '<table class="pos-table"><tr><th>Tipo</th><th>Strike</th><th>DTE</th><th>Entrata</th><th>Val.att.</th><th>P&L</th><th>Δ</th><th>θ</th><th>ν</th><th></th></tr>'+
  rows+'</table></div></div>';
}

/* ================================================================
   MAKE DECISION
================================================================ */
function makeDecision(decId){
  if(!currentNode||!decId)return;
  var dec=null;
  for(var i=0;i<currentNode.decisions.length;i++){
    if(currentNode.decisions[i].id===decId){dec=currentNode.decisions[i];break;}
  }
  if(!dec)return;

  // Disabilita bottoni subito
  var btns=document.querySelectorAll('.dec-btn');
  btns.forEach(function(b){b.disabled=true;b.style.opacity='0.5';});

  var T=0.08;

  // Applica posizione se params presenti
  if(dec.params){
    var p=dec.params;
    T=Math.max(0.001,(p.dte||30)/365);
    try{
      if(p.type==='iron_condor'){
        var ps=bs(p.spot,p.put_strike_h,T,0.05,p.iv,'put');
        var pb=bs(p.spot,p.put_strike_l,T,0.05,p.iv,'put');
        var cs=bs(p.spot,p.call_strike_l,T,0.05,p.iv,'call');
        var cb=bs(p.spot,p.call_strike_h,T,0.05,p.iv,'call');
        var prem=ps-pb+cs-cb;
        positions.push({id:decId,type:'Iron Condor',strike:p.put_strike_l+'/'+p.call_strike_h,
          dte_rem:p.dte||30,entry_price:prem,contracts:p.contracts||1,short:true,
          iv:p.iv,rate:0.05,spot_entry:p.spot,data:p,complex:true});
      } else if(p.type==='straddle'){
        var cp=bs(p.spot,p.strike,T,0.05,p.iv,'call');
        var pp=bs(p.spot,p.strike,T,0.05,p.iv,'put');
        var tot=cp+pp;
        positions.push({id:decId,type:'Straddle',strike:p.strike,
          dte_rem:p.dte||14,entry_price:tot,contracts:p.contracts||1,short:!!p.short,
          iv:p.iv,rate:0.05,spot_entry:p.spot,data:p});
      } else if(p.type==='bull_spread'||p.type==='put_spread'){
        var isC=p.type==='bull_spread';
        var sl=isC?(p.strike_l||p.strike):( p.strike_h||p.strike);
        var sh=isC?(p.strike_h||p.strike+10):(p.strike_l||p.strike-5);
        var lp=bs(p.spot,sl,T,0.05,p.iv,isC?'call':'put');
        var sp2=bs(p.spot,sh,T,0.05,p.iv,isC?'call':'put');
        var net=Math.abs(lp-sp2);
        positions.push({id:decId,type:isC?'Bull Spread':'Put Spread',strike:sl+'/'+sh,
          dte_rem:p.dte||30,entry_price:net,contracts:p.contracts||1,short:!!p.short,
          iv:p.iv,rate:0.05,spot_entry:p.spot,data:p});
      } else {
        var pr=bs(p.spot,p.strike,T,0.05,p.iv,p.type==='put'?'put':'call');
        positions.push({id:decId,type:p.type,strike:p.strike,
          dte_rem:p.dte||30,entry_price:pr,contracts:p.contracts||1,short:!!p.short,
          iv:p.iv,rate:0.05,spot_entry:p.spot,data:p});
      }
    } catch(e){ console.warn('Position error:',e); }
  }

  // Naviga al nodo successivo
  var nextId=dec.next;
  if(nextId==='recap'){
    decHistory.push({nodeId:currentNode.id,decId:decId,label:dec.label,
      mentor:dec.mentor_text,quality:dec.quality,pnlDelta:0});
    showRecap();
    return;
  }

  var nextNode=currentScenario.nodes.find(function(n){return n.id===nextId;});
  if(!nextNode){
    // Nodo non trovato — mostra errore nel mentor
    decHistory.push({nodeId:currentNode.id,decId:decId,label:dec.label,
      mentor:dec.mentor_text||'',quality:dec.quality,pnlDelta:0});
    renderSimulatore();
    return;
  }

  // Aggiorna DTE posizioni
  var daysDiff=Math.max(0,(nextNode.day||0)-(currentNode.day||0));
  positions.forEach(function(pos){
    pos.dte_rem=Math.max(0,pos.dte_rem-daysDiff);
  });

  // Calcola P&L delta
  var pnlDelta=calcTotalPnL(nextNode.market);

  // Registra in history
  decHistory.push({nodeId:currentNode.id,decId:decId,label:dec.label,
    mentor:dec.mentor_text||'',quality:dec.quality,pnlDelta:pnlDelta});

  // Aggiorna stato
  currentNode=nextNode;
  nodeCount++;
  capital=startCapital+calcTotalPnL(nextNode.market);

  // Re-render
  renderSimulatore();
  var cont=document.getElementById('content');
  if(cont) cont.scrollTo({top:0,behavior:'smooth'});
}

function closePosition(idx){
  if(!currentNode||isNaN(idx))return;
  var mkt=currentNode.market;
  var p=positions[idx];
  if(!p)return;
  var T=Math.max(0.001,p.dte_rem/365);
  var strike=typeof p.strike==='number'?p.strike:parseInt(p.strike)||450;
  var ptype=p.type.toLowerCase().indexOf('put')>=0?'put':'call';
  var price;
  try{ price=bs(mkt.spot,strike,T,mkt.rate||0.05,mkt.iv||p.iv,ptype); }
  catch(e){ price=p.entry_price; }
  var pnl=Math.round((price-p.entry_price)*p.contracts*100*(p.short?-1:1));
  positions.splice(idx,1);
  capital=startCapital+calcTotalPnL(mkt);
  decHistory.push({nodeId:currentNode.id,decId:'close_'+idx,
    label:'Chiusa posizione #'+(idx+1),
    mentor:'Posizione chiusa. P&L realizzato: '+(pnl>=0?'+':'')+fmtDollar(pnl)+'.',
    quality:pnl>=0?'good':'neutral',pnlDelta:pnl});
  renderSimulatore();
}

/* ================================================================
   P&L
================================================================ */
function calcTotalPnL(mkt){
  var total=0;
  positions.forEach(function(p){
    var T=Math.max(0.001,p.dte_rem/365);
    var strike=typeof p.strike==='number'?p.strike:parseInt(p.strike)||450;
    var ptype=p.type.toLowerCase().indexOf('put')>=0?'put':'call';
    var price;
    try{ price=bs(mkt.spot,strike,T,mkt.rate||0.05,mkt.iv||p.iv,ptype); }
    catch(e){ price=p.entry_price; }
    total+=(price-p.entry_price)*p.contracts*100*(p.short?-1:1);
  });
  return Math.round(total);
}

/* ================================================================
   RECAP
================================================================ */
function showRecap(){
  var pnl=capital-startCapital;
  var score=calcScore();
  var decs=decHistory.filter(function(h){return h.decId.indexOf('close_')<0;});
  archive.push({id:currentScenario.id,title:currentScenario.title,
    pnl:pnl,score:score,date:new Date().toLocaleDateString('it-IT'),
    bias:getDomBias(decs),
    decisions:decs.map(function(h){return {label:h.label,quality:h.quality,mentor:h.mentor||''};})});
  var good=decs.filter(function(h){return h.quality==='optimal'||h.quality==='good'||h.quality==='advanced';}).length;
  var bad=decs.filter(function(h){return h.quality==='terrible'||h.quality==='bad';}).length;

  var scoreColor=score>=75?'var(--grn)':score>=50?'var(--amb)':'var(--red)';
  var pColor=pnl>=0?'var(--grn)':'var(--red)';

  var cont=document.getElementById('sim-content');
  if(!cont)return;

  var html='<div style="text-align:center;padding:32px 20px 20px">'+
  '<div style="font-family:\'Playfair Display\',serif;font-size:72px;font-weight:600;color:'+scoreColor+';line-height:1">'+score+'</div>'+
  '<div style="font-size:13px;color:var(--t2);margin-top:6px">Score decisionale su 100</div>'+
  '</div>'+
  '<div class="mg mg4" style="margin-bottom:20px">'+
  '<div class="mc"><div class="mc-l">Capitale finale</div><div class="mc-v" style="color:'+pColor+'">'+(pnl>=0?'+':'')+fmtDollar(pnl)+'</div><div class="mc-s">su $'+startCapital.toLocaleString()+' iniziali</div></div>'+
  '<div class="mc"><div class="mc-l">Mosse corrette</div><div class="mc-v" style="color:var(--grn)">'+good+'</div><div class="mc-s">su '+decs.length+' totali</div></div>'+
  '<div class="mc"><div class="mc-l">Mosse errate</div><div class="mc-v" style="color:'+(bad>0?'var(--red)':'var(--t1)')+'">'+bad+'</div><div class="mc-s">errori significativi</div></div>'+
  '<div class="mc"><div class="mc-l">Bias rilevato</div><div class="mc-v" style="font-size:12px;color:var(--pur)">'+getDomBias(decs)+'</div></div>'+
  '</div>'+

  '<div style="font-size:10px;font-weight:500;letter-spacing:.1em;color:var(--t3);text-transform:uppercase;margin-bottom:10px">Il tuo percorso</div>'+
  '<div style="background:var(--pill);border:1px solid var(--b1);border-radius:12px;padding:14px 16px;margin-bottom:16px">';

  decs.forEach(function(h){
    var q=h.quality;
    var ok=q==='optimal'||q==='good'||q==='advanced';
    var bad2=q==='terrible'||q==='bad';
    var clr=ok?'var(--grn)':bad2?'var(--red)':'var(--amb)';
    var ic=ok?'✓':bad2?'✗':'→';
    html+='<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--b1)">'+
    '<div style="width:18px;height:18px;border-radius:50%;background:'+clr.replace('var(--','rgba(').replace(')',',.15)')+';color:'+clr+';font-size:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px">'+ic+'</div>'+
    '<div><div style="font-size:12px;color:var(--t1);font-weight:500">'+h.label+'</div>'+
    '<div style="font-size:11px;color:var(--t2);margin-top:2px;line-height:1.6;font-style:italic">'+h.mentor+'</div></div></div>';
  });
  html+='</div>';

  // Percorso ottimale
  html+='<div style="font-size:10px;font-weight:500;letter-spacing:.1em;color:var(--t3);text-transform:uppercase;margin-bottom:10px">Percorso ottimale — '+currentScenario.optimalBias+'</div>'+
  '<div style="background:var(--pill);border:1px solid var(--pur);border-radius:12px;padding:14px 16px;margin-bottom:16px">'+
  buildOptimalPath()+
  '<div style="margin-top:10px;font-size:12px;color:var(--pur);font-family:\'JetBrains Mono\',monospace">P&L ottimale: '+(currentScenario.optimalPnl>=0?'+':'')+'$'+currentScenario.optimalPnl+'</div>'+
  '</div>'+

  '<div class="btn-row">'+
  '<button class="btn-p" onclick="restartScenario()">Rigioca daccapo</button>'+
  '<button class="btn-g" onclick="S_go(1)">Scegli altro scenario</button>'+
  '</div>';

  cont.innerHTML=html;
}

function getDomBias(decs){
  var c={loss_aversion:0,sunk_cost:0,overconfidence:0};
  decs.forEach(function(h){
    if(h.quality==='bad'||h.quality==='terrible'){
      if(h.label.toLowerCase().indexOf('tengo')>=0) c.loss_aversion++;
      if(h.label.toLowerCase().indexOf('aggiungo')>=0) c.sunk_cost++;
      if(h.label.toLowerCase().indexOf('rimbalz')>=0) c.overconfidence++;
    }
  });
  var max=0,dom='—';
  Object.keys(c).forEach(function(k){if(c[k]>max){max=c[k];dom=k==='loss_aversion'?'Loss Aversion':k==='sunk_cost'?'Sunk Cost':'Overconfidence';}});
  return dom;
}

function buildOptimalPath(){
  var html='';
  var optDecs=currentScenario.optimalPath;
  var nodes=currentScenario.nodes;
  var cur=nodes[0];
  var step=1;
  var seen={};
  while(cur&&step<=8){
    if(seen[cur.id])break;
    seen[cur.id]=true;
    var od=cur.decisions.find(function(d){return optDecs.indexOf(d.id)>=0;});
    if(!od) od=cur.decisions.find(function(d){return d.quality==='optimal';});
    if(!od) break;
    html+='<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--b1)">'+
    '<div style="width:18px;height:18px;border-radius:50%;background:var(--pgbg);color:var(--pur);font-size:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-family:\'JetBrains Mono\',monospace">'+step+'</div>'+
    '<div style="font-size:12px;color:var(--t2);line-height:1.6"><strong style="color:var(--t1)">'+cur.label+':</strong> '+od.label+'</div></div>';
    cur=nodes.find(function(n){return n.id===od.next;});
    step++;
  }
  return html||'<div style="font-size:12px;color:var(--t3)">Percorso ottimale non disponibile per questo scenario.</div>';
}

function calcScore(){
  var decs=decHistory.filter(function(h){return h.decId.indexOf('close_')<0;});
  if(!decs.length) return 0;
  var pts=0;
  decs.forEach(function(h){
    pts+=h.quality==='optimal'?100:h.quality==='good'||h.quality==='advanced'?75:
         h.quality==='suboptimal'||h.quality==='risky'?40:h.quality==='bad'?15:
         h.quality==='terrible'?0:50;
  });
  return Math.round(pts/decs.length);
}

function restartScenario(){
  if(currentScenario) startScenario(currentScenario.id);
  else S_go(1);
}

================================================================ */
function updateSidebar(){
  var delta=capital-startCapital;
  var pct=Math.round(delta/startCapital*1000)/10;
  var col=delta>=0?'var(--grn)':delta<-startCapital*0.2?'var(--red)':'var(--amb)';
  var capEl=document.getElementById('sb-cap');
  var delEl=document.getElementById('sb-delta');
  var fillEl=document.getElementById('cap-fill');
  var sessEl=document.getElementById('sb-session');
  if(capEl){capEl.textContent='$'+Math.round(capital).toLocaleString();capEl.style.color=col;}
  if(delEl){delEl.textContent=(delta>=0?'+':'')+fmtDollar(delta)+' ('+pct+'%)';delEl.style.color=col;}
  if(fillEl){
    var pct2=Math.max(5,Math.min(100,capital/startCapital*100));
    fillEl.style.width=pct2+'%';
    fillEl.style.background=pct2>=90?'var(--grn)':pct2>=70?'var(--amb)':'var(--red)';
  }
  if(sessEl&&currentScenario){
    sessEl.innerHTML='<strong style="color:var(--t1)">'+currentScenario.title+'</strong><br>'+
    'Nodo: '+(currentNode?currentNode.label:'—')+'<br>'+
    'Mosse: '+decHistory.length+'<br>Posizioni: '+positions.length;
  }
}

/* ================================================================
   ARCHIVIO
================================================================ */
function buildArchivio(){return '<div id="archivio-content"></div>';}
function renderArchivio(){
  var cont=document.getElementById('archivio-content');
  if(!cont)return;
  if(!archive.length){
    cont.innerHTML='<div class="hero"><div class="hero-lbl"><span class="hero-dot"></span>Archivio</div>'+
    '<h1 class="hero-title">Nessuno scenario <em>completato</em></h1>'+
    '<p style="color:var(--t2);font-size:14px;margin-bottom:20px">Completa uno scenario per vedere qui il recap delle tue scelte.</p>'+
    '<div class="btn-row"><button class="btn-p" onclick="S_go(1)">Vai agli scenari \u2192</button></div></div>';
    return;
  }

  var html='<div class="hero"><div class="hero-lbl"><span class="hero-dot"></span>Archivio</div>'+
  '<h1 class="hero-title">Le tue <em>sessioni</em></h1>'+
  '<p style="color:var(--t2);font-size:14px;margin-bottom:0">'+archive.length+' scenario'+(archive.length===1?'':'i')+' completat'+(archive.length===1?'o':'i')+'.</p>'+
  '<div class="hero-rule"></div></div>';

  archive.forEach(function(a,ai){
    var pColor=a.pnl>=0?'var(--grn)':'var(--red)';
    var scoreColor=a.score>=75?'var(--grn)':a.score>=50?'var(--amb)':'var(--red)';
    var uid='arc-'+ai;
    var decs=a.decisions||[];
    var good=decs.filter(function(d){return d.quality==='optimal'||d.quality==='good'||d.quality==='advanced';}).length;
    var bad=decs.filter(function(d){return d.quality==='terrible'||d.quality==='bad';}).length;

    html+='<div style="background:var(--pill);border:1px solid var(--b1);border-radius:14px;overflow:hidden;margin-bottom:12px;box-shadow:var(--sh)">';

    // Header — sempre visibile
    html+='<div style="padding:16px 18px;display:flex;align-items:center;gap:12px;cursor:pointer" onclick="toggleArc('+ai+')" data-arc="'+ai+'">'+
    '<div style="flex:1">'+
    '<div style="font-size:13px;font-weight:500;color:var(--t1);margin-bottom:3px">'+a.title+'</div>'+
    '<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">'+
    '<span style="font-size:11px;color:var(--t3)">'+a.date+'</span>'+
    '<span style="font-size:11px;color:var(--t3)">·</span>'+
    '<span style="font-size:11px;color:var(--t2)">'+decs.length+' mosse</span>'+
    '<span style="font-size:11px;color:var(--t3)">·</span>'+
    '<span style="font-size:11px;color:var(--grn)">'+good+' corrette</span>'+
    (bad>0?'<span style="font-size:11px;color:var(--t3)">·</span>'+
    '<span style="font-size:11px;color:var(--red)">'+bad+' errate</span>':'')+
    (a.bias&&a.bias!=='—'?'<span style="font-size:11px;color:var(--t3)">·</span>'+
    '<span style="font-size:11px;color:var(--pur)">'+a.bias+'</span>':'')+
    '</div></div>'+
    '<div style="text-align:right;flex-shrink:0">'+
    '<div style="font-family:\'JetBrains Mono\',monospace;font-size:18px;font-weight:500;color:'+pColor+'">'+(a.pnl>=0?'+':'')+fmtDollar(a.pnl)+'</div>'+
    '<div style="font-size:10px;color:'+scoreColor+';font-family:\'JetBrains Mono\',monospace">Score '+a.score+'/100</div>'+
    '</div>'+
    '<div id="arc-arrow-'+ai+'" style="color:var(--t3);font-size:12px;flex-shrink:0;transition:transform .2s">▼</div>'+
    '</div>';

    // Recap espandibile
    html+='<div id="'+uid+'" style="display:none;border-top:1px solid var(--b1);padding:14px 18px">';

    if(decs.length===0){
      html+='<div style="font-size:12px;color:var(--t3);text-align:center;padding:12px">Nessuna mossa registrata.</div>';
    } else {
      decs.forEach(function(d,di){
        var q=d.quality;
        var ok=q==='optimal'||q==='good'||q==='advanced';
        var bad2=q==='terrible'||q==='bad';
        var clr=ok?'var(--grn)':bad2?'var(--red)':'var(--amb)';
        var ic=ok?'✓':bad2?'✗':'→';
        var bgClr=ok?'rgba(26,122,58,.1)':bad2?'rgba(185,28,28,.08)':'rgba(146,64,14,.08)';
        html+='<div style="display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--b1)">'+
        '<div style="width:20px;height:20px;border-radius:50%;background:'+bgClr+';color:'+clr+
        ';font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">'+ic+'</div>'+
        '<div style="flex:1">'+
        '<div style="font-size:12px;color:var(--t1);font-weight:500;margin-bottom:2px">'+
        '<span style="font-family:\'JetBrains Mono\',monospace;font-size:9px;color:var(--t3);margin-right:6px">'+(di+1)+'.</span>'+
        d.label+'</div>'+
        (d.mentor?'<div style="font-size:11px;color:var(--t2);line-height:1.65;font-style:italic">'+d.mentor+'</div>':'')+
        '</div></div>';
      });
    }
    html+='</div></div>';
  });

  // Bottone replay
  html+='<div style="margin-top:16px;display:flex;gap:8px">'+
  '<button class="btn-p" onclick="S_go(1)">Scegli nuovo scenario</button>'+
  '<button class="btn-g" onclick="clearArchive()">Svuota archivio</button>'+
  '</div>';

  cont.innerHTML=html;
}

function toggleArc(idx){
  var panel=document.getElementById('arc-'+idx);
  var arrow=document.getElementById('arc-arrow-'+idx);
  if(!panel)return;
  var isOpen=panel.style.display!=='none';
  panel.style.display=isOpen?'none':'block';
  if(arrow)arrow.style.transform=isOpen?'':'rotate(180deg)';
}

function clearArchive(){
  if(!confirm('Svuotare tutto l\'archivio?'))return;
  archive=[];
  renderArchivio();
}

/* ================================================================
   UTILS
================================================================ */
function fmtDollar(n){return '$'+Math.abs(Math.round(n)).toLocaleString();}
function flipT(){
  var h=document.documentElement;
  h.setAttribute('data-t',h.getAttribute('data-t')==='dark'?'light':'dark');
}


(function(){setTimeout(function(){var _go=window.go;if(_go){window.go=function(n){_go(n);document.querySelectorAll(".mnb").forEach(function(b,i){b.classList.toggle("on",i===n);});};}var f=document.querySelector(".mnb");if(f)f.classList.add("on");},300);})();
</script>
