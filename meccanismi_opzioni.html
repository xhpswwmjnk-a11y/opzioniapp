<!DOCTYPE html>
<html lang="it" data-t="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Opzioni — Guida Completa</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4f0;--bg1:#fff;--bg2:#eceae3;--bg3:#e0ddd5;--b1:rgba(0,0,0,.07);--b2:rgba(0,0,0,.13);--t1:#1c1a14;--t2:#6b6860;--t3:#a8a59d;--acc:#c0420a;--abg:rgba(192,66,10,.08);--pur:#534AB7;--pbg:rgba(83,74,183,.09);--grn:#1a7a3a;--gbg:rgba(26,122,58,.09);--red:#b91c1c;--rbg:rgba(185,28,28,.08);--amb:#92400e;--mbg:rgba(146,64,14,.09);--sh:0 1px 4px rgba(0,0,0,.09)}
[data-t="dark"]{--bg:#0a0a0f;--bg1:#0f0f17;--bg2:#16161f;--bg3:#1d1d28;--b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);--t1:#f0eef8;--t2:#8a88a6;--t3:#45435e;--acc:#e05a1a;--abg:rgba(224,90,26,.1);--pur:#7c74e0;--pbg:rgba(124,116,224,.11);--grn:#22c55e;--gbg:rgba(34,197,94,.09);--red:#f87171;--rbg:rgba(248,113,113,.09);--amb:#fbbf24;--mbg:rgba(251,191,36,.09);--sh:0 1px 6px rgba(0,0,0,.4)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.65;transition:background .3s,color .3s;min-height:100vh}
.topbar{background:var(--bg1);border-bottom:1px solid var(--b1);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.brand{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;white-space:nowrap;flex-shrink:0}
.brand em{font-style:italic;color:var(--acc)}
.ch-nav{display:flex;gap:3px;overflow-x:auto;flex:1;justify-content:center}
.ch-nav::-webkit-scrollbar{display:none}
.cpill{padding:4px 11px;border-radius:20px;border:1px solid var(--b1);background:transparent;color:var(--t2);cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .15s}
.cpill:hover{background:var(--bg2);color:var(--t1)}
.cpill.on{background:var(--acc);color:#fff;border-color:var(--acc);font-weight:500}
.cpill.qp.on{background:var(--pur);border-color:var(--pur)}
.cpill.qp{border-color:var(--pur);color:var(--pur)}
.cpill.gp.on{background:var(--grn);border-color:var(--grn)}
.cpill.gp{border-color:var(--grn);color:var(--grn)}
.tog{display:flex;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;user-select:none}
.tog-track{width:38px;height:21px;border-radius:11px;border:1px solid var(--b2);background:var(--bg3);position:relative;flex-shrink:0}
.tog-thumb{width:15px;height:15px;border-radius:50%;background:var(--t1);position:absolute;top:2px;left:2px;transition:transform .22s}
[data-t="dark"] .tog-thumb{transform:translateX(17px)}
.tog-lbl{font-size:11px;color:var(--t3)}
.prog{display:flex;height:3px;background:var(--bg2)}
.ps{flex:1;background:transparent;transition:background .25s}
.ps.on{background:var(--acc)}
.wrap{display:grid;grid-template-columns:196px 1fr;min-height:calc(100vh - 55px)}
.sidebar{background:var(--bg1);border-right:1px solid var(--b1);padding:20px 0;position:sticky;top:55px;height:calc(100vh - 55px);overflow-y:auto;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--bg3)}
.sb-sec{padding:0 14px 18px;border-bottom:1px solid var(--b1);margin-bottom:14px}
.sb-lbl{font-size:9px;font-weight:500;letter-spacing:.12em;color:var(--t3);text-transform:uppercase;margin-bottom:10px}
.sbi{display:flex;align-items:flex-start;gap:7px;padding:6px 8px;border-radius:7px;cursor:pointer;transition:all .13s;font-size:11px;color:var(--t2);line-height:1.4;border:none;background:transparent;font-family:'DM Sans',sans-serif;width:100%;text-align:left}
.sbi:hover{background:var(--bg2);color:var(--t1)}
.sbi.on{background:var(--abg);color:var(--acc);font-weight:500}
.sbi.on.qs{background:var(--pbg);color:var(--pur)}
.sbi.on.gs{background:var(--gbg);color:var(--grn)}
.sbn{font-family:'JetBrains Mono',monospace;font-size:9px;width:16px;height:16px;border-radius:4px;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;color:var(--t3)}
.sbi.on .sbn{background:var(--acc);color:#fff}
.sbi.on.qs .sbn{background:var(--pur);color:#fff}
.sbi.on.gs .sbn{background:var(--grn);color:#fff}
.sb-info{padding:14px;margin-top:auto}
.sb-info p{font-size:11px;color:var(--t3);line-height:1.6}
.content{overflow-y:auto;padding:40px 48px 80px}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--bg3)}
.ch{display:none}
.ch.on{display:block;animation:rise .2s ease}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hero{margin-bottom:36px}
.hero-lbl{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--acc);letter-spacing:.08em;font-weight:500;text-transform:uppercase;margin-bottom:12px}
.hero-dot{width:5px;height:5px;border-radius:50%;background:var(--acc)}
.hero-title{font-family:'Playfair Display',serif;font-size:38px;line-height:1.15;color:var(--t1);margin-bottom:12px;letter-spacing:-.01em}
.hero-title em{font-style:italic;color:var(--acc)}
.hero-lead{font-size:15px;color:var(--t2);line-height:1.78;max-width:560px}
.hero-rule{height:1px;background:var(--b1);margin-top:28px}
.slbl{font-size:9px;font-weight:500;letter-spacing:.13em;color:var(--t3);text-transform:uppercase;margin:28px 0 12px}
.callout{border-left:3px solid var(--pur);background:var(--pbg);border-radius:0 10px 10px 0;padding:13px 17px;margin:16px 0;font-size:13px;color:var(--t2);line-height:1.75}
.callout strong{color:var(--t1);font-weight:500}
.c-ok{border-color:var(--grn);background:var(--gbg)}
.c-ok strong{color:var(--t1)}
[data-t="dark"] .c-ok{color:#86efac}
.c-warn{border-color:var(--red);background:var(--rbg)}
[data-t="dark"] .c-warn{color:#fca5a5}
.c-amb{border-color:var(--amb);background:var(--mbg)}
[data-t="dark"] .c-amb{color:#fcd34d}
.mg{display:grid;gap:10px;margin-bottom:20px}
.mg2{grid-template-columns:1fr 1fr}
.mg3{grid-template-columns:1fr 1fr 1fr}
.mg4{grid-template-columns:repeat(4,1fr)}
.mc{background:var(--bg2);border-radius:12px;padding:13px 15px;border:1px solid var(--b1)}
.mc-l{font-size:9px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.mc-v{font-family:'JetBrains Mono',monospace;font-size:21px;font-weight:500;line-height:1}
.mc-s{font-size:11px;color:var(--t2);margin-top:4px;line-height:1.55}
.sw{background:var(--bg1);border:1px solid var(--b1);border-radius:14px;padding:18px 20px;margin-bottom:18px;box-shadow:var(--sh)}
.st{font-size:12px;font-weight:500;color:var(--t1);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.sd{width:6px;height:6px;border-radius:50%;background:var(--acc);flex-shrink:0}
.sr{display:flex;align-items:center;gap:11px;margin-bottom:10px}
.sr:last-child{margin-bottom:0}
.sr label{font-size:12px;color:var(--t2);width:130px;flex-shrink:0}
.sr input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:3px;background:var(--bg3);border-radius:2px;outline:none;cursor:pointer}
.sr input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--acc);cursor:pointer;border:2px solid var(--bg1)}
.sr select{flex:1;background:var(--bg2);color:var(--t1);border:1px solid var(--b2);border-radius:7px;padding:5px 9px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer}
.sv{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--acc);min-width:52px;text-align:right}
.cw{position:relative;width:100%;margin-bottom:4px}
.cr{display:grid;gap:11px;margin-bottom:18px}
.cr2{grid-template-columns:1fr 1fr}
.cr3{grid-template-columns:1fr 1fr 1fr}
.card{background:var(--bg1);border:1px solid var(--b1);border-radius:12px;padding:15px 17px;box-shadow:var(--sh)}
.ct{border-top:3px solid var(--pur)}
.cg{border-top:3px solid var(--grn)}
.cr_{border-top:3px solid var(--red)}
.ca{border-top:3px solid var(--amb)}
.co{border-top:3px solid var(--acc)}
.ch_{font-size:13px;font-weight:500;color:var(--t1);margin-bottom:5px}
.cb{font-size:12px;color:var(--t2);line-height:1.7}
.badge{display:inline-block;font-size:9px;font-weight:500;padding:2px 7px;border-radius:12px;margin-right:4px;font-family:'JetBrains Mono',monospace}
.bg_{background:var(--gbg);color:var(--grn)}
.br_{background:var(--rbg);color:var(--red)}
.ba_{background:var(--mbg);color:var(--amb)}
.bp_{background:var(--pbg);color:var(--pur)}
.tl-w{position:relative;padding-left:22px;margin:14px 0}
.tl-w::before{content:'';position:absolute;left:7px;top:6px;bottom:6px;width:1px;background:var(--b2)}
.tl{position:relative;padding:4px 0 14px 13px}
.tl::before{content:'';position:absolute;left:-15px;top:9px;width:9px;height:9px;border-radius:50%;background:var(--bg3);border:2px solid var(--b2)}
.tl.ok::before{background:var(--grn);border-color:var(--gbg)}
.tl.warn::before{background:var(--amb);border-color:var(--mbg)}
.tl.bad::before{background:var(--red);border-color:var(--rbg)}
.tl-t{font-size:13px;font-weight:500;color:var(--t1);margin-bottom:3px}
.tl-b{font-size:12px;color:var(--t2);line-height:1.65}
.hr{height:1px;background:var(--b1);margin:26px 0}
.btn-row{display:flex;gap:9px;flex-wrap:wrap;margin-top:32px;padding-top:24px;border-top:1px solid var(--b1)}
.btn-p{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;background:var(--acc);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .15s}
.btn-p:hover{opacity:.85}
.btn-g{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;background:transparent;color:var(--t2);border:1px solid var(--b2);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s}
.btn-g:hover{background:var(--bg2);color:var(--t1)}
/* checklist */
.ck-g{margin-bottom:16px}
.ck-gt{font-size:10px;font-weight:500;letter-spacing:.08em;color:var(--t3);text-transform:uppercase;margin-bottom:8px;display:flex;justify-content:space-between}
.ck-l{background:var(--bg1);border:1px solid var(--b1);border-radius:10px;overflow:hidden;box-shadow:var(--sh)}
.ck-i{display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background .12s}
.ck-i:last-child{border-bottom:none}
.ck-i:hover{background:var(--bg2)}
.ck-i.done .ck-lbl{text-decoration:line-through;color:var(--t3)}
.ck-box{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--b2);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ck-lbl{font-size:12px;color:var(--t1);flex:1;line-height:1.5}
.ck-tag{font-size:9px;padding:2px 7px;border-radius:10px;font-family:'JetBrains Mono',monospace;font-weight:500;flex-shrink:0}
.pb{height:5px;background:var(--bg3);border-radius:3px;margin-bottom:14px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .3s}
.pb-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--t3);margin-bottom:6px}
.verdict{padding:11px 14px;border-radius:9px;font-size:13px;line-height:1.6;margin-top:12px;border-left:3px solid}
.v-ok{border-color:var(--grn);background:var(--gbg)}
.v-warn{border-color:var(--amb);background:var(--mbg)}
.v-no{border-color:var(--red);background:var(--rbg)}
/* cases */
.ctabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.ctab{padding:5px 12px;border-radius:20px;border:1px solid var(--b1);background:transparent;color:var(--t2);cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;transition:all .13s}
.ctab:hover{background:var(--bg2);color:var(--t1)}
.ctab.on{font-weight:500;background:var(--abg);color:var(--acc);border-color:var(--acc)}
.cpanel{display:none}
.cpanel.on{display:block;animation:rise .2s ease}
/* risks */
.rcard{background:var(--bg1);border:1px solid var(--b1);border-radius:12px;overflow:hidden;margin-bottom:10px;box-shadow:var(--sh)}
.rhdr{display:flex;align-items:center;gap:10px;padding:13px 15px;cursor:pointer;transition:background .13s}
.rhdr:hover{background:var(--bg2)}
.rnum{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.rbody{display:none;padding:0 15px 14px;font-size:12px;color:var(--t2);line-height:1.7;border-top:1px solid var(--b1)}
.rbody.open{display:block}
.rrule{margin-top:10px;padding:8px 11px;border-radius:8px;font-size:11px;font-weight:500}
.grules{background:var(--bg1);border:1px solid var(--grn);border-radius:14px;overflow:hidden;margin-top:20px;box-shadow:var(--sh)}
.grhead{background:var(--gbg);padding:14px 18px;font-size:13px;font-weight:500;color:var(--t1)}
.gri{display:flex;align-items:flex-start;gap:11px;padding:11px 18px;border-bottom:1px solid var(--b1)}
.gri:last-child{border-bottom:none}
.grn_{width:22px;height:22px;border-radius:50%;background:var(--grn);color:#fff;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.grt{font-size:12px;color:var(--t2);line-height:1.6}
.grt strong{color:var(--t1);font-weight:500}
/* sources */
.src{background:var(--bg1);border:1px solid var(--b1);border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--sh)}
.src-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.src-n{font-size:13px;font-weight:500;color:var(--acc)}
.src-b{font-size:10px;padding:2px 8px;border-radius:10px;font-family:'JetBrains Mono',monospace;background:var(--gbg);color:var(--grn)}
.src-d{font-size:12px;color:var(--t2);line-height:1.65;margin-bottom:8px}
.src-p{background:var(--bg2);border-radius:7px;padding:8px 11px;font-size:11px;color:var(--t2);line-height:1.6}
.src-p strong{color:var(--t1);font-weight:500}
.wf{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--b1)}
.wf:last-child{border-bottom:none}
.wfn{width:24px;height:24px;border-radius:50%;background:var(--acc);color:#fff;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
/* quiz */
.qdots{display:flex;gap:5px;margin-bottom:24px;flex-wrap:wrap}
.qd{width:10px;height:10px;border-radius:50%;background:var(--bg3);transition:background .2s}
.qd.ok{background:var(--grn)}
.qd.wr{background:var(--red)}
.qcard{background:var(--bg1);border:1px solid var(--b1);border-radius:14px;padding:20px 22px;margin-bottom:12px;box-shadow:var(--sh);transition:border-color .2s}
.qcard.aok{border-color:var(--grn);background:var(--gbg)}
.qcard.awr{border-color:var(--red);background:var(--rbg)}
.qnum{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);letter-spacing:.1em;margin-bottom:7px;display:flex;align-items:center;gap:8px}
.qtag{font-size:9px;font-weight:500;padding:2px 8px;border-radius:10px;background:var(--bg3);color:var(--t2)}
.qtxt{font-size:15px;color:var(--t1);line-height:1.6;margin-bottom:16px}
.qopts{display:flex;flex-direction:column;gap:7px}
.qopt{display:flex;align-items:flex-start;gap:11px;padding:11px 13px;border-radius:10px;border:1px solid var(--b1);background:var(--bg2);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;text-align:left;width:100%}
.qopt:hover:not([disabled]){border-color:var(--b2);background:var(--bg3)}
.qopt[disabled]{cursor:default}
.qopt.oo{border-color:var(--grn)!important;background:var(--gbg)!important}
.qopt.ow{border-color:var(--red)!important;background:var(--rbg)!important}
.qopt.or{border-color:var(--grn)!important;background:var(--gbg)!important;opacity:.6}
.qltr{width:23px;height:23px;border-radius:6px;background:var(--bg3);font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;color:var(--t2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.qopt.oo .qltr{background:var(--grn);color:#fff}
.qopt.ow .qltr{background:var(--red);color:#fff}
.qopt.or .qltr{background:var(--grn);color:#fff}
.qotx{font-size:13px;color:var(--t1);line-height:1.55;padding-top:3px}
.qfb{display:none;margin-top:13px;padding:13px 15px;border-radius:10px;font-size:13px;line-height:1.72;border-left:3px solid}
.qfb.fok{display:block;border-color:var(--grn);background:var(--gbg)}
.qfb.fwr{display:block;border-color:var(--red);background:var(--rbg)}
.fbi{display:flex;align-items:center;gap:6px;font-weight:500;margin-bottom:5px;font-size:13px}
.fbi.ok{color:var(--grn)}
.fbi.wr{color:var(--red)}
.fbd{font-size:12px;color:var(--t2);line-height:1.72}
.fbc{margin-top:9px;padding:8px 11px;background:var(--bg3);border-radius:7px;font-size:11px;color:var(--t2);line-height:1.6}
.fbc strong{color:var(--t1);font-weight:500}
.spanel{background:var(--bg1);border:1px solid var(--b1);border-radius:16px;padding:32px;text-align:center;display:none;box-shadow:var(--sh);margin-top:16px}
.spanel.vis{display:block}
.sbig{font-family:'Playfair Display',serif;font-size:60px;font-weight:600;line-height:1;margin-bottom:5px}
.ssub{font-size:13px;color:var(--t2);margin-bottom:18px}
.sbw{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;margin:0 auto 18px;max-width:280px}
.sbar{height:100%;border-radius:4px;transition:width .6s ease}
.smsg{font-size:14px;color:var(--t2);line-height:1.7;max-width:400px;margin:0 auto 22px}
/* glossary */
.gsrch{width:100%;padding:10px 15px;background:var(--bg1);border:1px solid var(--b2);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--t1);outline:none;margin-bottom:16px;box-shadow:var(--sh)}
.gsrch:focus{border-color:var(--grn)}
.gsrch::placeholder{color:var(--t3)}
.gfltr{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:20px}
.gfb{padding:4px 12px;border-radius:20px;border:1px solid var(--b1);background:transparent;color:var(--t2);cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;transition:all .13s}
.gfb:hover{background:var(--bg2);color:var(--t1)}
.gfb.on{font-weight:500}
.gfb[data-c=tutti].on{background:var(--bg3);color:var(--t1)}
.gfb[data-c=base].on{background:var(--abg);color:var(--acc);border-color:var(--acc)}
.gfb[data-c=greci].on{background:var(--pbg);color:var(--pur);border-color:var(--pur)}
.gfb[data-c=volatilita].on{background:var(--mbg);color:var(--amb);border-color:var(--amb)}
.gfb[data-c=strategia].on{background:var(--gbg);color:var(--grn);border-color:var(--grn)}
.gfb[data-c=rischio].on{background:var(--rbg);color:var(--red);border-color:var(--red)}
.gcnt{font-size:11px;color:var(--t3);margin-bottom:14px}
.gstit{font-size:9px;font-weight:500;letter-spacing:.1em;color:var(--t3);text-transform:uppercase;margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:7px}
.ggrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.gterm{background:var(--bg1);border:1px solid var(--b1);border-radius:12px;padding:13px 15px;box-shadow:var(--sh);transition:border-color .15s}
.gterm:hover{border-color:var(--b2)}
.gterm.hidden{display:none}
.gtt{display:flex;align-items:flex-start;justify-content:space-between;gap:7px;margin-bottom:5px}
.gw{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:var(--t1);line-height:1.2}
.gen{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-bottom:7px}
.gcat{font-size:9px;font-weight:500;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;font-family:'JetBrains Mono',monospace}
.gc-base{background:var(--abg);color:var(--acc)}
.gc-greci{background:var(--pbg);color:var(--pur)}
.gc-volatilita{background:var(--mbg);color:var(--amb)}
.gc-strategia{background:var(--gbg);color:var(--grn)}
.gc-rischio{background:var(--rbg);color:var(--red)}
.gdef{font-size:12px;color:var(--t2);line-height:1.65;margin-bottom:7px}
.gform{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--pur);background:var(--pbg);border-radius:6px;padding:4px 8px;margin-bottom:7px;display:inline-block}
.gex{font-size:11px;color:var(--t3);background:var(--bg2);border-radius:7px;padding:6px 9px;line-height:1.6;font-style:italic}
.gex strong{color:var(--t1);font-style:normal;font-weight:500}
.gempty{text-align:center;padding:36px;font-size:14px;color:var(--t3);display:none}
.gempty.vis{display:block}
.lgnd{background:var(--bg1);border:1px solid var(--b1);border-radius:14px;padding:18px 20px;margin-bottom:22px;box-shadow:var(--sh)}
.lgnd-t{font-size:13px;font-weight:500;color:var(--t1);margin-bottom:13px}
.lgnd-r{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--b1);font-size:12px}
.lgnd-r:last-child{border-bottom:none}
.lgnd-s{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;width:40px;flex-shrink:0}
.lgnd-n{color:var(--t1);width:110px;flex-shrink:0}
.lgnd-d{color:var(--t2);flex:1;line-height:1.5}

/* ═══════════════════════════════════════
   MOBILE RESPONSIVE — max-width: 768px
═══════════════════════════════════════ */
@media(max-width:768px){

  /* TOPBAR */
  .topbar{padding:0 14px;height:48px;gap:8px}
  .brand{font-size:12px}
  .ch-nav{display:none} /* nascosta su mobile — navigazione via bottom nav */
  .tog-lbl{display:none}
  .prog{display:none}

  /* LAYOUT: rimuovi sidebar, content full width */
  .wrap{grid-template-columns:1fr;min-height:calc(100vh - 48px - 56px)}
  .sidebar{display:none}
  .content{padding:20px 16px 80px;overflow-y:visible}

  /* BOTTOM NAV */
  .mob-nav{display:flex!important}

  /* HERO */
  .hero-title{font-size:26px}
  .hero-lead{font-size:13px}
  .hero{margin-bottom:24px}
  .slbl{margin:20px 0 10px}

  /* GRIGLIE → colonna singola */
  .mg2,.mg3,.mg4{grid-template-columns:1fr}

  /* CONTENT specifico */
  .content{font-size:13px}

  /* SIMULATORI */
  .sim-panel{padding:14px 12px}
  .ctrl-row{flex-wrap:wrap;gap:8px}
  .ctrl-row label{min-width:100px}
  .ctrl-row input[type=range]{width:100%}
  .res-grid{grid-template-columns:1fr 1fr}

  /* TABELLE → scroll orizzontale */
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:500px}

  /* CALLOUT */
  .callout{padding:11px 13px;font-size:12px}

  /* QUIZ */
  .q-opts{gap:7px}
  .q-opt{padding:10px 12px;font-size:12px}

  /* GLOSSARIO */
  .glos-grid{grid-template-columns:1fr}
  .gsearch{font-size:14px}

  /* CHECKLIST */
  .ck-group{padding:12px}
  .ck-item{font-size:12px;gap:10px}

  /* MC cards */
  .mc{padding:11px 12px}
  .mc-v{font-size:17px}
}

/* BOTTOM NAV — visibile solo su mobile */
.mob-nav{
  display:none;
  position:fixed;
  bottom:0;left:0;right:0;
  height:56px;
  background:var(--bg1);
  border-top:1px solid var(--b1);
  z-index:300;
  box-shadow:0 -2px 10px rgba(0,0,0,.1);
}
.mob-nav-inner{
  display:flex;
  height:100%;
  overflow-x:auto;
  align-items:stretch;
  -webkit-overflow-scrolling:touch;
}
.mob-nav-inner::-webkit-scrollbar{display:none}
.mnb{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  flex:0 0 auto;
  min-width:72px;
  padding:0 8px;
  gap:3px;
  border:none;
  background:transparent;
  color:var(--t3);
  cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:color .15s;
}
.mnb.on{color:var(--acc)}
.mnb-icon{font-size:16px;line-height:1}
.mnb-label{font-size:9px;font-weight:500;letter-spacing:.04em;text-align:center;white-space:nowrap}
.mnb.on .mnb-icon{transform:scale(1.1)}


/* iOS safe area fix */
.mob-nav{
  padding-bottom: env(safe-area-inset-bottom);
  height: calc(56px + env(safe-area-inset-bottom));
}
@media(max-width:768px){
  .content{padding-bottom: calc(80px + env(safe-area-inset-bottom))!important}
  .wrap{min-height:calc(100vh - 48px - 56px - env(safe-area-inset-bottom))}
}


/* ── BOTTOM NAV FIX iOS ── */
.mob-nav{
  display:none;
  position:fixed!important;
  bottom:0!important;
  left:0!important;
  right:0!important;
  z-index:9999!important;
  background:var(--bg1)!important;
  border-top:1px solid var(--b1)!important;
  padding-bottom:env(safe-area-inset-bottom,0px)!important;
  height:auto!important;
  min-height:56px!important;
  box-shadow:0 -2px 12px rgba(0,0,0,.2)!important;
}
@media(max-width:768px){
  .mob-nav{display:flex!important}
  body{padding-bottom:calc(72px + env(safe-area-inset-bottom,20px))!important}
  .content{
    padding-bottom:calc(100px + env(safe-area-inset-bottom,20px))!important;
    overflow-y:auto!important;
  }
}

(function boot(){
  var nav=document.getElementById('nav'),prog=document.getElementById('prog'),sb=document.getElementById('sb');
  CHAPS.forEach(function(ch,i){
    var p=document.createElement('button');
    p.className='cpill'+(ch.pc?' '+ch.pc:'');
    p.textContent=ch.l;p.onclick=function(){go(i);};nav.appendChild(p);
    var s=document.createElement('div');s.className='ps';s.id='ps'+i;prog.appendChild(s);
    var b=document.createElement('button');
    b.className='sbi'+(ch.sc?' '+ch.sc:'');

function go(n){
  curr=n;
  document.querySelectorAll('.cpill').forEach(function(b,i){b.classList.toggle('on',i===n);});
  document.querySelectorAll('.sbi').forEach(function(b,i){b.classList.toggle('on',i===n);});
  for(var i=0;i<CHAPS.length;i++){var el=document.getElementById('ps'+i);if(el)el.classList.toggle('on',i<=n);}
  var c=document.getElementById('content');c.scrollTo({top:0,behavior:'smooth'});
  render(n);
}

function render(n){
  var cont=document.getElementById('chs');
  var old=cont.querySelectorAll('.ch');
  old.forEach(function(el){el.classList.remove('on');});
  var id='ch-'+CHAPS[n].id;
  var el=document.getElementById(id);
  if(el){el.classList.add('on');after(n);return;}
  el=document.createElement('div');el.className='ch on';el.id=id;
  var builders=[bCos,bDelta,bTheta,bVol,bCrush,bFlow,bRischi,bDati,bQuiz,bGlos];
  el.innerHTML=builders[n]();
  cont.appendChild(el);
  after(n);
}

function after(n){
  var fns=[null,iDelta,iTheta,iIV,iVC,iFlow,null,null,iQuiz,iGlos];
  if(fns[n])setTimeout(fns[n],80);
}

function Phi(x){var a=[.254829592,-.284496736,1.421413741,-1.453152027,1.061405429],p=.3275911,s=x<0?-1:1;x=Math.abs(x)/Math.SQRT2;var t=1/(1+p*x),y=1-(((((a[4]*t+a[3])*t+a[2])*t+a[1])*t+a[0])*t*Math.exp(-x*x));return .5*(1+s*y);}
function bsC(S,K,T,r,v){if(T<=0||v<=0)return Math.max(0,S-K);var d1=(Math.log(S/K)+(r+.5*v*v)*T)/(v*Math.sqrt(T));return Math.max(0,S*Phi(d1)-K*Math.exp(-r*T)*Phi(d1-v*Math.sqrt(T)));}
function bsDel(S,K,T,r,v,c){if(T<=0||v<=0)return c?(S>K?1:0):(S<K?-1:0);var d1=(Math.log(S/K)+(r+.5*v*v)*T)/(v*Math.sqrt(T));return c?Phi(d1):Phi(d1)-1;}
function bsVg(S,K,T,r,v){if(T<=0||v<=0)return 0;var d1=(Math.log(S/K)+(r+.5*v*v)*T)/(v*Math.sqrt(T));return S*Math.exp(-d1*d1/2)*Math.sqrt(T)/(100*Math.sqrt(2*Math.PI));}

  var S=G('ds'),K=G('dk'),T=G('dt')/365,v=G('dv')/100,r=.05;
  document.getElementById('dvs').textContent='$'+S;
  document.getElementById('dvk').textContent='$'+K;
  document.getElementById('dvt').textContent=G('dt')+'gg';
  document.getElementById('dvv').textContent=G('dv')+'%';
  var d=bsDel(S,K,T,r,v,true),p=bsC(S,K,T,r,v),be=K+p;
  document.getElementById('rd').textContent=d.toFixed(3);
  document.getElementById('rp').textContent='$'+p.toFixed(2);
  document.getElementById('rbe').textContent='$'+be.toFixed(2);
  var m=S>K*1.02?'ITM':S<K*.98?'OTM':'ATM';
  var mc={ITM:grn(),ATM:amb(),OTM:red()};
  var ms={ITM:'Supera lo strike \u2014 valore intrinseco reale',ATM:'Al livello dello strike \u2014 massima sensibilit\xe0',OTM:'Solo valore temporale \u2014 nessun valore intrinseco'};
  document.getElementById('rm').textContent=m;document.getElementById('rm').style.color=mc[m];
  document.getElementById('rms').textContent=ms[m];
  document.getElementById('dins').innerHTML='<strong>Concreto:</strong> delta '+d.toFixed(2)+' \u2014 se il titolo sale di $1 guadagni $'+d.toFixed(2)+'. Per $10: $'+(d*10).toFixed(2)+'. BE a $'+be.toFixed(2)+'.';
  var px=[],dl=[];for(var i=72;i<=138;i++){px.push(i);dl.push(parseFloat(bsDel(i,K,T,r,v,true).toFixed(4)));}
  if(CH.d){CH.d.destroy();CH.d=null;}
  CH.d=new Chart(document.getElementById('cd'),{type:'line',
    data:{labels:px.map(function(x){return '$'+x;}),datasets:[
      {data:dl,borderColor:pur(),borderWidth:2.5,pointRadius:0,tension:.4,fill:false},
      {data:px.map(function(x){return x===S?bsDel(x,K,T,r,v,true):null;}),borderWidth:0,pointRadius:11,pointBackgroundColor:grn(),showLine:false}
    ]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{title:function(c){return 'Spot: '+c[0].label;},label:function(c){return 'Delta: '+c.parsed.y.toFixed(3);}}}},
      scales:{x:{ticks:{color:tc(),font:{size:9},maxTicksLimit:10},grid:{color:gc()},border:{color:gc()}},
        y:{min:0,max:1,ticks:{color:tc(),font:{size:9}},grid:{color:gc()},border:{color:gc()}}}}});
}
function iDelta(){uD();}

function uT(){
  var prem=G('tp'),mono=document.getElementById('tm').value;
  document.getElementById('tvp').textContent='$'+prem;
  var vals=[];
  for(var d=30;d>=0;d--){var t=d/30,v;if(mono==='atm')v=prem*Math.pow(t,.5);else if(mono==='otm')v=prem*Math.pow(t,.35);else v=prem*(.35+.65*Math.pow(t,.6));vals.push(parseFloat(Math.max(0,v).toFixed(3)));}
  var v7=vals[23],th=parseFloat((vals[22]-vals[23]).toFixed(3));
  document.getElementById('tv7').textContent='$'+v7.toFixed(2);
  document.getElementById('tvth').textContent='-$'+th.toFixed(2)+'/gg';
  var ins={atm:'ATM: a 7 giorni vale solo $'+v7.toFixed(2)+' su $'+prem+' iniziali. Theta brucia $'+th.toFixed(2)+'/gg nell\'ultima settimana.',
    otm:'OTM: decadimento inizialmente lento poi brutale. A 7 giorni vale solo $'+v7.toFixed(2)+'. Quasi sempre scade a zero.',
    itm:'ITM: ha valore intrinseco, non va mai a zero. A 7 giorni vale ancora $'+v7.toFixed(2)+'.'};
  document.getElementById('tins').textContent=ins[mono];
  var days=Array.from({length:31},function(_,i){return 30-i;});
  if(CH.t){CH.t.destroy();CH.t=null;}
  CH.t=new Chart(document.getElementById('ct'),{type:'line',
    data:{labels:days,datasets:[
      {label:'Residuo',data:vals,borderColor:pur(),backgroundColor:dark()?'rgba(124,116,224,0.09)':'rgba(83,74,183,0.07)',fill:true,borderWidth:2.5,pointRadius:0,tension:.4},
      {label:'Perso',data:vals.map(function(v){return parseFloat((prem-v).toFixed(3));}),borderColor:red(),borderDash:[5,4],borderWidth:1.5,pointRadius:0,tension:.4,fill:false}
    ]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{title:function(c){return 'Giorni alla scadenza: '+c[0].label;},label:function(c){return c.dataset.label+': $'+c.parsed.y.toFixed(2);}}}},
      scales:{x:{ticks:{color:tc(),font:{size:9},maxTicksLimit:7},grid:{color:gc()},border:{color:gc()},title:{display:true,text:'Giorni alla scadenza',color:tc(),font:{size:9}}},
        y:{min:0,ticks:{color:tc(),font:{size:9},callback:function(v){return '$'+v;}},grid:{color:gc()},border:{color:gc()}}}}});
}
function iTheta(){uT();}

function uI(){
  var S=G('is'),K=G('ik'),T=G('id')/365,v=G('iv')/100,r=.05;
  document.getElementById('ivs').textContent='$'+S;
  document.getElementById('ivk').textContent='$'+K;
  document.getElementById('ivd').textContent=G('id')+'gg';
  document.getElementById('ivv').textContent=G('iv')+'%';
  var p=bsC(S,K,T,r,v),vg=bsVg(S,K,T,r,v);
  document.getElementById('ivpr').textContent='$'+p.toFixed(2);
  document.getElementById('ivvg').textContent='$'+vg.toFixed(3);
  document.getElementById('iins').textContent='Con IV al '+G('iv')+'% il premio \xe8 $'+p.toFixed(2)+'. Ogni +1% di IV vale $'+vg.toFixed(3)+'/contratto. Un calo di 10 punti (tipico post-earnings) costa $'+(vg*10).toFixed(2)+'/contratto.';
  var ivs=[],prems=[];for(var i=5;i<=80;i+=5){ivs.push(i);prems.push(parseFloat(bsC(S,K,T,r,i/100).toFixed(3)));}
  if(CH.i){CH.i.destroy();CH.i=null;}
  CH.i=new Chart(document.getElementById('ci'),{type:'line',
    data:{labels:ivs.map(function(i){return i+'%';}),datasets:[
      {data:prems,borderColor:amb(),backgroundColor:dark()?'rgba(251,191,36,0.08)':'rgba(146,64,14,0.07)',fill:true,borderWidth:2.5,pointRadius:0,tension:.4},
      {data:ivs.map(function(i){return i===G('iv')?bsC(S,K,T,r,i/100):null;}),borderWidth:0,pointRadius:11,pointBackgroundColor:pur(),showLine:false}
    ]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return 'Premio: $'+c.parsed.y.toFixed(2);}}}},
      scales:{x:{ticks:{color:tc(),font:{size:9}},grid:{color:gc()},border:{color:gc()}},
        y:{ticks:{color:tc(),font:{size:9},callback:function(v){return '$'+v;}},grid:{color:gc()},border:{color:gc()}}}}});
}
function iIV(){uI();}

function uVC(){
  var S0=G('vs0'),S1=G('vs1'),v0=G('vv0')/100,v1=G('vv1')/100,K=G('vk'),T0=G('vt')/365,T1=Math.max(.002,T0-1/365),r=.05;
  document.getElementById('vcs0').textContent='$'+S0;document.getElementById('vcs1').textContent='$'+S1;
  document.getElementById('vcv0').textContent=G('vv0')+'%';document.getElementById('vcv1').textContent=G('vv1')+'%';
  document.getElementById('vck').textContent='$'+K;document.getElementById('vct').textContent=G('vt')+'gg';
  var p0=bsC(S0,K,T0,r,v0),p1=bsC(S1,K,T1,r,v1),pnl=p1-p0,mov=S1-S0;
  document.getElementById('vp0').textContent='$'+p0.toFixed(2);
  document.getElementById('vp1').textContent='$'+p1.toFixed(2);
  document.getElementById('vpm').textContent=(mov>=0?'+':'')+'$'+mov.toFixed(1);
  var pe=document.getElementById('vpnl');pe.textContent=(pnl>=0?'+$':'-$')+Math.abs(pnl).toFixed(2);pe.style.color=pnl>=0?grn():red();
  var ins=document.getElementById('vcins');
  if(pnl<0&&mov>0){ins.className='callout c-warn';ins.innerHTML='<strong>Vol crush in azione:</strong> il titolo \xe8 salito di $'+mov.toFixed(1)+' ma l\'opzione ha perso $'+Math.abs(pnl).toFixed(2)+'. La IV \xe8 crollata dal '+G('vv0')+'% al '+G('vv1')+'%.';}
  else if(pnl>=0&&mov>0){ins.className='callout c-ok';ins.innerHTML='<strong>Il delta ha vinto:</strong> +$'+pnl.toFixed(2)+'. Il guadagno dal movimento ha superato la perdita dalla compressione IV.';}
  else{ins.className='callout c-warn';ins.innerHTML='<strong>Doppia perdita:</strong> titolo sceso E IV compressa. L\'opzione vale $'+Math.abs(pnl).toFixed(2)+' in meno.';}
}
function iVC(){uVC();}

/* ================================================================
   FLOW LOGIC
================================================================ */
function iFlow(){uCk();}
function sC(i){
  document.querySelectorAll('.ctab').forEach(function(t,idx){t.classList.toggle('on',idx===i);});
  for(var j=0;j<CASES.length;j++){
    var el=document.getElementById('cp-'+j);
    if(el)el.classList.toggle('on',j===i);
  }
}
function tCk(gi,ii){
  var k=gi+'_'+ii;ckState[k]=!ckState[k];
  var it=document.getElementById('cki-'+k),bx=document.getElementById('ckb-'+k),tk=document.getElementById('ckv-'+k);
  if(it)it.classList.toggle('done',ckState[k]);
  if(bx){bx.style.background=ckState[k]?'var(--grn)':'';bx.style.borderColor=ckState[k]?'var(--grn)':'';}
  if(tk)tk.style.display=ckState[k]?'block':'none';
  uCk();
}
function uCk(){
  var tot=0,done=0;
  CK_DATA.forEach(function(g,gi){
    var gd=0;g.items.forEach(function(_,ii){if(ckState[gi+'_'+ii]){done++;gd++;}tot++;});
    var gl=document.getElementById('ckg-'+gi);if(gl)gl.textContent=gd+'/'+g.items.length;
  });
  var pct=tot>0?Math.round(done/tot*100):0;
  var f=document.getElementById('ck-fill'),l=document.getElementById('ck-lbl'),p=document.getElementById('ck-pct');
  if(f)f.style.width=pct+'%';if(l)l.textContent=done+' / '+tot+' completati';if(p)p.textContent=pct+'%';
  var v=document.getElementById('ck-verdict');
  if(v){
    if(pct===100){v.className='verdict v-ok';v.textContent='Checklist completa. Puoi aprire il trade.';}
    else if(pct>=75){v.className='verdict v-warn';v.textContent='Quasi pronto. Completa i punti mancanti prima di aprire.';}
    else if(pct>=50){v.className='verdict v-no';v.textContent='A met\xe0 strada. Non aprire il trade ancora.';}
    else{v.className='verdict v-no';v.textContent='Completa la checklist per ricevere un verdetto.';}
  }
}
function tR(n){
  var b=document.getElementById('rb-'+n),a=document.getElementById('ra-'+n);
  var open=b.classList.contains('open');
  document.querySelectorAll('.rbody').forEach(function(x){x.classList.remove('open');});
  document.querySelectorAll('[id^=ra-]').forEach(function(x){x.style.transform='';});
  if(!open){b.classList.add('open');if(a)a.style.transform='rotate(180deg)';}
}

================================================================ */
function iQuiz(){
  if(qDone)return;qDone=true;qState={a:[]};
  var dots=document.getElementById('qdots'),cont=document.getElementById('qcont');
  if(!dots||!cont)return;
  dots.innerHTML=QZ.map(function(_,i){return '<div class="qd" id="qd'+i+'"></div>';}).join('');
  cont.innerHTML='';
  QZ.forEach(function(q,i){
    var L=['A','B','C','D'];
    var h='<div class="qcard" id="qc'+i+'"><div class="qnum"><span>Domanda '+(i+1)+'/'+QZ.length+'</span><span class="qtag">'+q.tag+'</span></div><div class="qtxt">'+q.q+'</div><div class="qopts">';
    q.opts.forEach(function(o,j){
      h+='<button class="qopt" id="qo'+i+'_'+j+'" onclick="aQ('+i+','+j+')"><span class="qltr" id="ql'+i+'_'+j+'">'+L[j]+'</span><span class="qotx">'+o+'</span></button>';
    });
    h+='</div><div class="qfb" id="qf'+i+'"></div></div>';
    cont.innerHTML+=h;
  });
}
function aQ(qi,ch){
  if(qState.a[qi]!==undefined)return;
  qState.a[qi]=ch;
  var q=QZ[qi],ok=q.a===ch,L=['A','B','C','D'];
  for(var j=0;j<q.opts.length;j++){
    var btn=document.getElementById('qo'+qi+'_'+j);
    if(btn)btn.setAttribute('disabled','true');
    if(j===q.a&&j===ch)btn.className='qopt oo';
    else if(j===ch&&j!==q.a)btn.className='qopt ow';
    else if(j===q.a&&j!==ch)btn.className='qopt or';
  }
  var card=document.getElementById('qc'+qi);if(card)card.classList.add(ok?'aok':'awr');
  var dot=document.getElementById('qd'+qi);if(dot)dot.classList.add(ok?'ok':'wr');
  var fb=document.getElementById('qf'+qi);
  if(fb){
    var icon=ok?'<div class="fbi ok"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M5 8l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Risposta corretta</div>':
      '<div class="fbi wr"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M5.5 5.5l5 5M10.5 5.5l-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>Risposta errata &mdash; corretta: '+L[q.a]+'</div>';
    fb.className='qfb '+(ok?'fok':'fwr');
    fb.innerHTML=icon+'<div class="fbd">'+(ok?q.ok:q.wr)+'</div><div class="fbc"><strong>Concetto chiave:</strong> '+q.c+'</div>';
    setTimeout(function(){fb.scrollIntoView({behavior:'smooth',block:'nearest'});},100);
  }
  var ans=qState.a.filter(function(x){return x!==undefined;}).length;
  if(ans===QZ.length)setTimeout(sScore,700);
}
function sScore(){
  var corr=QZ.filter(function(q,i){return qState.a[i]===q.a;}).length;
  var pct=Math.round(corr/QZ.length*100);
  var panel=document.getElementById('qscore');if(!panel)return;
  document.getElementById('sbig').textContent=corr+'/'+QZ.length;
  document.getElementById('sbig').style.color=pct>=80?grn():pct>=50?amb():red();
  document.getElementById('ssub').textContent=pct+'% di risposte corrette';
  var bar=document.getElementById('sbar');
  bar.style.background=pct>=80?grn():pct>=50?amb():red();bar.style.width='0%';
  var msgs={100:'Eccellente. Hai padronanza completa di tutti i meccanismi. Apri il simulatore e testa le strategie con piena consapevolezza.',
    80:'Ottimo. Solida comprensione. Rivedi le domande sbagliate &mdash; probabilmente sul vol crush o theta accelerato.',
    50:'Buona base. Rileggi i capitoli 3, 5 e 6 con i simulatori, poi rifai il quiz.',
    0:"C'\xe8 ancora lavoro da fare. Riparti dal capitolo 1, segui l'ordine e usa i simulatori."};
  var k=pct>=100?100:pct>=80?80:pct>=50?50:0;
  document.getElementById('smsg').innerHTML=msgs[k];
  panel.classList.add('vis');
  setTimeout(function(){bar.style.transition='width .6s ease';bar.style.width=pct+'%';},100);
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function rQuiz(){
  qDone=false;
  var c=document.getElementById('qcont'),d=document.getElementById('qdots'),p=document.getElementById('qscore');
  if(c)c.innerHTML='';if(d)d.innerHTML='';if(p)p.classList.remove('vis');
  iQuiz();
}

function iGlos(){
  if(gDone)return;gDone=true;
  var cats={base:'Concetti base',greci:'I greci',volatilita:'Volatilit\xe0',strategia:'Strategie',rischio:'Rischio e operativit\xe0'};

  var grid=document.getElementById('ggrid');if(!grid)return;

      h+='<div class="gtt"><div><div class="gw">'+g.w+'</div><div class="gen">'+g.en+'</div></div><span class="gcat '+cd[g.c]+'">'+g.c+'</span></div>';
      h+='<div class="gdef">'+g.d+'</div>';

function fGlos(){
  var q=(document.getElementById('gs').value||'').toLowerCase();
  document.querySelectorAll('.gterm').forEach(function(t){
    var mc=gCat==='tutti'||t.getAttribute('data-c')===gCat;

  });
  document.querySelectorAll('[id^=gs-]').forEach(function(s){
    s.style.display=s.querySelectorAll('.gterm:not(.hidden)').length>0?'':'none';
  });

  var cnt=document.getElementById('gcnt');if(cnt)cnt.textContent=tot+' termin'+(tot===1?'e':'i');
  var em=document.getElementById('gempty');if(em)em.classList.toggle('vis',tot===0);
}
function sCat(c){
  gCat=c;
  document.querySelectorAll('.gfb').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-c')===c);});
  fGlos();
}

/* ── MOBILE BOTTOM NAV SYNC ── */
(function(){
  function buildMobNav(){
    var inner = document.getElementById('mob-nav-inner');
    if(!inner) return;
    var pills = document.querySelectorAll('.cpill');
    inner.innerHTML = '';
    pills.forEach(function(pill, i){
      var btn = document.createElement('button');
      btn.className = 'mnb' + (pill.classList.contains('on') ? ' on' : '');
      btn.innerHTML = '<span class="mnb-icon">' + getMobIcon(i) + '</span>' +
        '<span class="mnb-label">' + pill.textContent + '</span>';
      btn.onclick = function(){ pill.click(); syncMobNav(); };
      inner.appendChild(btn);
    });
  }
  function getMobIcon(i){
    var icons = ['📖','Δ','θ','σ','💥','📊','⚠','📡','🧠','🎯','📝','32'];
    return icons[i] || (i+1);
  }
  function syncMobNav(){
    var pills = document.querySelectorAll('.cpill');
    var btns = document.querySelectorAll('.mnb');
    pills.forEach(function(p,i){
      if(btns[i]) btns[i].classList.toggle('on', p.classList.contains('on'));
    });
    // Scroll active into view
    var active = document.querySelector('.mnb.on');
    if(active) active.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  }
  // Build after boot
  var origGo = window.G_go || window.go;
  setTimeout(function(){
    buildMobNav();
    // Intercept go() calls to sync mob nav
    var _go = window.go;
    if(_go){
      window.go = function(n){
        _go(n);
        setTimeout(syncMobNav, 50);
      };
    }
  }, 200);
})();
